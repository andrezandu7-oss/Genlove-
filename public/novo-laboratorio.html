<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Laboratório · Ministério da Saúde</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            background: #006633;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 35px 40px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            color: #006633;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            border-left: 6px solid #006633;
            padding-left: 20px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
            margin-top: 5px;
            padding-left: 26px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 25px;
        }
        .full-width {
            grid-column: span 2;
        }
        .campo {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .campo label {
            font-weight: 600;
            color: #333;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .campo label i {
            color: #006633;
            font-style: normal;
            font-weight: 400;
        }
        .campo input, .campo select, .campo textarea {
            padding: 12px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: 0.2s;
            background: #fafafa;
        }
        .campo input:focus, .campo select:focus, .campo textarea:focus {
            outline: none;
            border-color: #006633;
            background: white;
            box-shadow: 0 0 0 3px rgba(0,102,51,0.1);
        }
        .campo input.required, .campo select.required {
            border-left: 4px solid #006633;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }
        .checkbox-group input {
            width: 18px;
            height: 18px;
            accent-color: #006633;
        }
        .acoes {
            margin-top: 35px;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            align-items: center;
        }
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary {
            background: #006633;
            color: white;
            box-shadow: 0 4px 12px rgba(0,102,51,0.3);
        }
        .btn-primary:hover {
            background: #004d26;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0,102,51,0.4);
        }
        .btn-secondary {
            background: #f1f1f1;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e4e4e4;
        }
        #resposta {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            font-size: 14px;
        }
        .sucesso {
            background: #e8f5e9;
            color: #1e7e34;
            border: 1px solid #a5d6a7;
            display: block !important;
        }
        .erro {
            background: #ffebee;
            color: #b71c1c;
            border: 1px solid #ffcdd2;
            display: block !important;
        }
        .info-chave {
            background: #f0f7ff;
            border: 1px dashed #006633;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0 10px;
            word-break: break-all;
            font-family: monospace;
            font-size: 14px;
        }
        .info-chave strong {
            color: #006633;
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
        }
        hr {
            border: none;
            border-top: 2px solid #eee;
            margin: 20px 0;
        }
        .badge {
            background: #00663310;
            color: #006633;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 13px;
            display: inline-block;
        }
        @media (max-width: 650px) {
            .container { padding: 25px; }
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>➕ NOVO LABORATÓRIO</h1>
        <div class="subtitle">Registar nova unidade laboratorial no SNS · Angola</div>

        <form id="formLab">
            <div class="form-grid">
                <!-- Nome -->
                <div class="campo full-width">
                    <label>🏥 Nome do Laboratório <span style="color:#c62828;">*</span></label>
                    <input type="text" id="nome" class="required" placeholder="Ex.: LabCentral Luanda" required>
                </div>

                <!-- NIF + Tipo -->
                <div class="campo">
                    <label>📄 NIF <span style="color:#c62828;">*</span></label>
                    <input type="text" id="nif" class="required" placeholder="10 dígitos" maxlength="10" pattern="\d{10}" title="Deve conter 10 dígitos" required>
                </div>
                <div class="campo">
                    <label>⚖️ Tipo <span style="color:#c62828;">*</span></label>
                    <select id="tipo" required>
                        <option value="">Selecionar</option>
                        <option value="Público">Público</option>
                        <option value="Privado">Privado</option>
                        <option value="Misto">Misto</option>
                    </select>
                </div>

                <!-- Província + Município -->
                <div class="campo">
                    <label>📍 Província <span style="color:#c62828;">*</span></label>
                    <select id="provincia" required>
                        <option value="">Selecionar</option>
                        <option value="Luanda">Luanda</option>
                        <option value="Benguela">Benguela</option>
                        <option value="Huíla">Huíla</option>
                        <option value="Cabinda">Cabinda</option>
                        <option value="Outra">Outra</option>
                    </select>
                </div>
                <div class="campo">
                    <label>🗺️ Município</label>
                    <input type="text" id="municipio" placeholder="Ex.: Ingombota">
                </div>

                <!-- Endereço (full) -->
                <div class="campo full-width">
                    <label>🏛️ Endereço completo <span style="color:#c62828;">*</span></label>
                    <input type="text" id="endereco" class="required" placeholder="Rua, número, bairro" required>
                </div>

                <!-- Telefones -->
                <div class="campo">
                    <label>📞 Telefone 1 <span style="color:#c62828;">*</span></label>
                    <input type="tel" id="telefone" class="required" placeholder="+244 900 000 000" required>
                </div>
                <div class="campo">
                    <label>📞 Telefone 2</label>
                    <input type="tel" id="telefone2" placeholder="Opcional">
                </div>

                <!-- Email + Website -->
                <div class="campo">
                    <label>✉️ Email <span style="color:#c62828;">*</span></label>
                    <input type="email" id="email" class="required" placeholder="lab@exemplo.ao" required>
                </div>
                <div class="campo">
                    <label>🌐 Website</label>
                    <input type="url" id="website" placeholder="https://...">
                </div>

                <!-- Diretor + Resp.Técnico -->
                <div class="campo">
                    <label>👨‍⚕️ Diretor <span style="color:#c62828;">*</span></label>
                    <input type="text" id="diretor" class="required" placeholder="Nome completo" required>
                </div>
                <div class="campo">
                    <label>🧪 Responsável Técnico</label>
                    <input type="text" id="responsavelTecnico" placeholder="Se diferente do diretor">
                </div>

                <!-- Licença + Validade -->
                <div class="campo">
                    <label>📜 Nº Licença</label>
                    <input type="text" id="licenca" placeholder="Ex.: 1234/MINSAL/25">
                </div>
                <div class="campo">
                    <label>📅 Validade da Licença</label>
                    <input type="date" id="validadeLicenca">
                </div>

                <!-- Status ativo (checkbox) -->
                <div class="campo full-width checkbox-group">
                    <input type="checkbox" id="ativo" checked>
                    <label for="ativo" style="font-weight:500;">✅ Laboratório ativo (pode emitir certificados)</label>
                </div>
            </div>

            <hr>

            <div class="acoes">
                <a href="/admin-dashboard" class="btn btn-secondary">← Cancelar</a>
                <button type="submit" class="btn btn-primary" id="btnSalvar">💾 Registar Laboratório</button>
            </div>
        </form>

        <!-- Área de resposta / API Key -->
        <div id="resposta"></div>
        <div id="apiKeyContainer" style="display: none;" class="info-chave">
            <strong>🔑 LABORATÓRIO CRIADO COM SUCESSO</strong>
            <p style="margin:5px 0; font-weight:500;">Guarde esta chave API — não será mostrada novamente.</p>
            <code id="apiKeyValue" style="background:#fff; padding:10px; display:block; border-radius:8px; border:1px solid #006633;"></code>
            <p style="margin-top:12px; font-size:13px;">Utilize esta chave para autenticação do laboratório no sistema.</p>
        </div>
    </div>

    <script>
        (function() {
            const token = localStorage.getItem('token');
            if (!token) {
                alert('Sessão expirada. Faça login novamente.');
                window.location.href = '/ministerio';
                return;
            }

            const form = document.getElementById('formLab');
            const btnSalvar = document.getElementById('btnSalvar');
            const respostaDiv = document.getElementById('resposta');
            const apiKeyContainer = document.getElementById('apiKeyContainer');
            const apiKeySpan = document.getElementById('apiKeyValue');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                respostaDiv.style.display = 'none';
                respostaDiv.className = '';
                apiKeyContainer.style.display = 'none';

                // Validação simples do NIF (10 dígitos)
                const nif = document.getElementById('nif').value.trim();
                if (!/^\d{10}$/.test(nif)) {
                    mostrarErro('NIF deve conter exatamente 10 dígitos numéricos.');
                    return;
                }

                // Recolher dados
                const dados = {
                    nome: document.getElementById('nome').value.trim(),
                    nif: nif,
                    tipo: document.getElementById('tipo').value,
                    provincia: document.getElementById('provincia').value,
                    municipio: document.getElementById('municipio').value.trim(),
                    endereco: document.getElementById('endereco').value.trim(),
                    telefone: document.getElementById('telefone').value.trim(),
                    telefone2: document.getElementById('telefone2').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    website: document.getElementById('website').value.trim(),
                    diretor: document.getElementById('diretor').value.trim(),
                    responsavelTecnico: document.getElementById('responsavelTecnico').value.trim(),
                    licenca: document.getElementById('licenca').value.trim(),
                    validadeLicenca: document.getElementById('validadeLicenca').value || null,
                    ativo: document.getElementById('ativo').checked
                };

                // Campos obrigatórios adicionais (já com required no html, mas só por segurança)
                if (!dados.nome || !dados.tipo || !dados.provincia || !dados.endereco || !dados.telefone || !dados.email || !dados.diretor) {
                    mostrarErro('Preencha todos os campos obrigatórios (*).');
                    return;
                }

                btnSalvar.disabled = true;
                btnSalvar.textContent = '⏳ Registando...';

                try {
                    const response = await fetch('/api/labs', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify(dados)
                    });

                    const result = await response.json();

                    if (response.ok && result.success) {
                        // Sucesso: mostrar API Key e mensagem
                        respostaDiv.className = 'sucesso';
                        respostaDiv.innerHTML = '✅ Laboratório criado com sucesso! A chave de acesso está abaixo.';
                        respostaDiv.style.display = 'block';

                        apiKeySpan.textContent = result.apiKey;
                        apiKeyContainer.style.display = 'block';

                        // Opcional: limpar campos sensíveis? Deixamos preenchido para referência
                        // Podemos desabilitar o botão ou mudar para "voltar"
                        btnSalvar.disabled = false;
                        btnSalvar.textContent = '💾 Registar Outro';
                        form.reset();  // limpa o formulário, mas mantém a chave visível
                        document.getElementById('ativo').checked = true;  // reativar default
                    } else {
                        // Erro retornado pela API
                        mostrarErro(result.error || 'Erro desconhecido ao registar laboratório.');
                        btnSalvar.disabled = false;
                        btnSalvar.textContent = '💾 Registar Laboratório';
                    }
                } catch (error) {
                    console.error('Erro na requisição:', error);
                    mostrarErro('Erro de ligação ao servidor. Tente novamente.');
                    btnSalvar.disabled = false;
                    btnSalvar.textContent = '💾 Registar Laboratório';
                }
            });

            function mostrarErro(mensagem) {
                respostaDiv.className = 'erro';
                respostaDiv.innerHTML = '❌ ' + mensagem;
                respostaDiv.style.display = 'block';
                apiKeyContainer.style.display = 'none';
            }

            // Ajustar pattern do NIF dinamicamente
            document.getElementById('nif').addEventListener('input', function(e) {
                this.value = this.value.replace(/\D/g, '').slice(0,10);
            });
        })();
    </script>
</body>
</html>
