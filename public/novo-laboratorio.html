<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS - Registrar Laboratório</title>
    <style>
        :root {--primary: #006633; --bg: #f4f7f6; --text: #333;}
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 800px; width: 100%; margin: 20px auto; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 30px; }
        h1 { color: var(--primary); margin-bottom: 25px; font-size: 24px; border-left: 6px solid var(--primary); padding-left: 15px; }
        .campo { margin-bottom: 20px; }
        .campo label { display: block; font-weight: bold; margin-bottom: 6px; color: #555; font-size: 13px; text-transform: uppercase; }
        .campo input, .campo select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,102,51,0.3); }
        .btn-secondary { background: #f0f0f0; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; }
        .hidden { display: none; }
        .error { color: #c0392b; background: #fdeaea; padding: 10px; border-radius: 6px; margin-bottom: 20px; }
        .success { color: var(--primary); background: #e8f5e9; padding: 10px; border-radius: 6px; margin-bottom: 20px; }
        .api-key-box { background: #fcf8e3; border: 1px solid #f0ad4e; padding: 15px; border-radius: 6px; margin: 20px 0; word-break: break-all; }
        .api-key-box strong { color: #8a6d3b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🏥 Registrar Novo Laboratório</h1>
            <div id="errorMsg" class="error hidden"></div>
            <div id="successMsg" class="success hidden"></div>
            <div id="apiKeyContainer" class="api-key-box hidden">
                <strong>🔑 API Key gerada:</strong> <span id="apiKeyValue"></span><br>
                <small style="color:#8a6d3b;">Guarde este código em local seguro. Ele não será mostrado novamente.</small>
            </div>

            <form id="labForm">
                <div class="grid-2">
                    <div class="campo" style="grid-column: span 2;">
                        <label>Nome da Instituição *</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="campo">
                        <label>NIF *</label>
                        <input type="text" id="nif" required maxlength="10" pattern="\d{10}" title="Deve ter 10 dígitos">
                    </div>
                    <div class="campo">
                        <label>Tipo *</label>
                        <select id="tipo" required>
                            <option value="laboratorio">Laboratório</option>
                            <option value="hospital">Hospital</option>
                            <option value="clinica">Clínica</option>
                        </select>
                    </div>
                    <div class="campo">
                        <label>Província *</label>
                        <select id="provincia" required>
                            <option value="Bengo">Bengo</option><option value="Benguela">Benguela</option><option value="Bié">Bié</option>
                            <option value="Cabinda">Cabinda</option><option value="Cuando Cubango">Cuando Cubango</option>
                            <option value="Cuanza Norte">Cuanza Norte</option><option value="Cuanza Sul">Cuanza Sul</option>
                            <option value="Cunene">Cunene</option><option value="Huambo">Huambo</option><option value="Huíla">Huíla</option>
                            <option value="Luanda" selected>Luanda</option><option value="Lunda Norte">Lunda Norte</option>
                            <option value="Lunda Sul">Lunda Sul</option><option value="Malanje">Malanje</option>
                            <option value="Moxico">Moxico</option><option value="Namibe">Namibe</option>
                            <option value="Uíge">Uíge</option><option value="Zaire">Zaire</option>
                        </select>
                    </div>
                    <div class="campo">
                        <label>Município</label>
                        <input type="text" id="municipio">
                    </div>
                    <div class="campo" style="grid-column: span 2;">
                        <label>Endereço</label>
                        <input type="text" id="endereco">
                    </div>
                    <div class="campo">
                        <label>Telefone</label>
                        <input type="text" id="telefone">
                    </div>
                    <div class="campo">
                        <label>Email</label>
                        <input type="email" id="email">
                    </div>
                    <div class="campo">
                        <label>Diretor</label>
                        <input type="text" id="diretor">
                    </div>
                    <div class="campo">
                        <label>Licença Nº</label>
                        <input type="text" id="licenca">
                    </div>
                    <div class="campo">
                        <label>Validade da Licença</label>
                        <input type="date" id="validadeLicenca">
                    </div>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="submit" class="btn-primary">✅ Registrar Laboratório</button>
                    <button type="button" class="btn-secondary" onclick="history.back()">↩️ Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/ministerio';
        }

        const errorDiv = document.getElementById('errorMsg');
        const successDiv = document.getElementById('successMsg');
        const apiKeyContainer = document.getElementById('apiKeyContainer');
        const apiKeySpan = document.getElementById('apiKeyValue');
        const form = document.getElementById('labForm');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            // Validar NIF
            const nif = document.getElementById('nif').value;
            if (!/^\d{10}$/.test(nif)) {
                showError('NIF deve conter exatamente 10 dígitos.');
                return;
            }

            const payload = {
                nome: document.getElementById('nome').value,
                nif,
                tipo: document.getElementById('tipo').value,
                provincia: document.getElementById('provincia').value,
                municipio: document.getElementById('municipio').value || undefined,
                endereco: document.getElementById('endereco').value || undefined,
                telefone: document.getElementById('telefone').value || undefined,
                email: document.getElementById('email').value || undefined,
                diretor: document.getElementById('diretor').value || undefined,
                licenca: document.getElementById('licenca').value || undefined,
                validadeLicenca: document.getElementById('validadeLicenca').value || undefined,
                ativo: true
            };

            try {
                const res = await fetch('/api/labs', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    showSuccess('Laboratório registado com sucesso!');
                    apiKeySpan.innerText = data.apiKey;
                    apiKeyContainer.classList.remove('hidden');
                    form.reset();
                } else {
                    showError(data.error || 'Erro ao registrar laboratório.');
                }
            } catch (err) {
                showError('Erro de conexão com o servidor.');
            }
        });

        function showError(msg) {
            errorDiv.innerText = msg;
            errorDiv.classList.remove('hidden');
            successDiv.classList.add('hidden');
            apiKeyContainer.classList.add('hidden');
        }

        function showSuccess(msg) {
            successDiv.innerText = msg;
            successDiv.classList.remove('hidden');
            errorDiv.classList.add('hidden');
        }

        function hideMessages() {
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            apiKeyContainer.classList.add('hidden');
        }
    </script>
</body>
</html>
