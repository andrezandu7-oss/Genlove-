<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS Angola - Registo de Laboratório</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --primary-color: #004a99; --success-color: #28a745; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--primary-color); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; transition: background 0.3s; margin-top: 20px; }
        .btn-submit:hover { background: #003366; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        #message { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; text-align: center; }
        .error { background: #ffebee; color: #c62828; display: block !important; }
        .success { background: #e8f5e9; color: #2e7d32; display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏥 Registo de Novo Laboratório</h2>
    <p style="font-size: 0.9em; color: #666; margin-bottom: 20px;">Insira os dados oficiais para integração no Sistema Nacional de Saúde.</p>

    <form id="formNovoLab">
        <div class="form-group">
            <label for="nome">Nome da Instituição:</label>
            <input type="text" id="nome" placeholder="Ex: Laboratório Central de Luanda" required>
        </div>

        <div class="form-group">
            <label for="nif">NIF / Número de Alvará:</label>
            <input type="text" id="nif" placeholder="001234567LA040" required>
        </div>

        <div class="form-group">
            <label for="provincia">Província:</label>
            <select id="provincia" required>
                <option value="">Selecione a Província...</option>
                <option value="Luanda">Luanda</option>
                <option value="Benguela">Benguela</option>
                <option value="Huambo">Huambo</option>
                <option value="Huila">Huíla</option>
                <option value="Cabinda">Cabinda</option>
                </select>
        </div>

        <div class="form-group">
            <label for="email">E-mail Oficial:</label>
            <input type="email" id="email" placeholder="contacto@lab.gov.ao" required>
        </div>

        <button type="submit" id="btnSubmit" class="btn-submit">Validar e Guardar no Sistema</button>
    </form>

    <div id="message"></div>
</div>

<script>
    document.getElementById('formNovoLab').addEventListener('submit', async (e) => {
        e.preventDefault();

        const btn = document.getElementById('btnSubmit');
        const messageDiv = document.getElementById('message');
        
        // 1. Captura de Dados
        const payload = {
            nome: document.getElementById('nome').value,
            nif: document.getElementById('nif').value,
            provincia: document.getElementById('provincia').value,
            email: document.getElementById('email').value,
            ativo: true // Ativado por padrão para aparecer nos Dashboards
        };

        // 2. Recuperação do Token JWT (Armazenado no login)
        const token = localStorage.getItem('token');
        if (!token) {
            messageDiv.className = 'error';
            messageDiv.innerText = "Sessão expirada. Por favor, faça login novamente.";
            setTimeout(() => window.location.href = 'login.html', 2000);
            return;
        }

        try {
            // Estado de carregamento
            btn.innerText = "A processar dados...";
            btn.disabled = true;
            messageDiv.style.display = 'none';

            // 3. Chamada ao Backend na Render
            // Nota: O desenvolvedor deve garantir que a rota POST /api/laboratorios existe
            const response = await fetch('/api/laboratorios', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (response.ok) {
                // Sucesso
                messageDiv.className = 'success';
                messageDiv.innerHTML = `✅ Laboratório registado com sucesso!<br>API Key gerada: <strong>${result.apiKey || 'Pendente'}</strong>`;
                document.getElementById('formNovoLab').reset();
                
                // Redireciona para o Dashboard após 3 segundos
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 3000);
            } else {
                // Erro do Servidor
                messageDiv.className = 'error';
                messageDiv.innerText = "Erro: " + (result.message || "Não foi possível registar.");
            }

        } catch (error) {
            // Erro de Rede
            messageDiv.className = 'error';
            messageDiv.innerText = "Falha de ligação ao servidor Render. Verifique a internet.";
            console.error("Erro Fetch:", error);
        } finally {
            btn.innerText = "Validar e Guardar no Sistema";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
