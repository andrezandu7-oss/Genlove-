<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Laboratório · SNS Angola</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f0f4f0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 40, 20, 0.15);
            overflow: hidden;
            border: 1px solid rgba(0, 102, 51, 0.2);
        }
        .header {
            background: #006633;
            color: white;
            padding: 2rem 2.5rem;
        }
        .header h1 {
            font-weight: 600;
            font-size: 2rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 span {
            background: #ffcc00;
            color: #006633;
            font-size: 1rem;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 500;
        }
        .header p {
            opacity: 0.85;
            margin-top: 6px;
            font-size: 1rem;
        }
        .form-card {
            padding: 2.5rem;
        }
        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #006633;
            border-bottom: 2px solid #cce8d5;
            padding-bottom: 0.5rem;
            margin: 2rem 0 1.5rem 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title:first-of-type {
            margin-top: 0;
        }
        .section-title i {
            font-size: 1.6rem;
            opacity: 0.8;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.2rem;
        }
        .campo {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 0.8rem;
        }
        .campo.full-width {
            grid-column: span 2;
        }
        label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #2d4a3b;
        }
        input, select, textarea {
            padding: 12px 14px;
            border: 1.5px solid #d0ded5;
            border-radius: 14px;
            font-size: 0.95rem;
            background: white;
            transition: 0.2s;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #006633;
            box-shadow: 0 0 0 3px rgba(0, 102, 51, 0.2);
        }
        .badge-obrigatorio {
            color: #cc3300;
            font-size: 0.7rem;
            margin-left: 5px;
        }
        .btn-emitir {
            background: #006633;
            color: white;
            border: none;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 1.2rem;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 2.5rem;
            box-shadow: 0 8px 16px rgba(0, 102, 51, 0.3);
            letter-spacing: 0.5px;
        }
        .btn-emitir:hover {
            background: #008040;
            transform: scale(1.02);
        }
        .btn-emitir:disabled {
            background: #99bbaa;
            box-shadow: none;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #6c757d;
            margin-left: 10px;
        }
        .btn-secondary:hover {
            background: #5a6268;
            transform: scale(1.02);
        }
        .info-message {
            color: #2c5e3f;
            background: #e0f0e5;
            padding: 1rem;
            border-radius: 16px;
            font-size: 0.9rem;
            border-left: 4px solid #ffaa00;
            margin-bottom: 1.5rem;
        }
        .resultado-popup {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            margin: 2rem auto;
        }
        .resultado-popup .sucesso {
            color: #006633;
            font-size: 2rem;
            font-weight: bold;
        }
        .resultado-popup .api-key {
            background: #ffcc00;
            padding: 0.5rem 1rem;
            border-radius: 60px;
            font-family: monospace;
            font-size: 1.2rem;
            margin: 1rem 0;
            word-break: break-all;
        }
        .link-voltar {
            display: inline-block;
            margin-top: 2rem;
            color: #006633;
            text-decoration: none;
            font-weight: 600;
        }
        .hidden {
            display: none;
        }
        .acoes {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .spinner {
            border: 5px solid #e6f0ea;
            border-top: 5px solid #006633;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>
            🏥 Novo Laboratório / Hospital
            <span>MINSA</span>
        </h1>
        <p>Registo de unidades sanitárias no Sistema Nacional de Saúde</p>
    </div>

    <div class="form-card">
        <!-- mensagem de carregamento / erro de token -->
        <div id="loadingMessage" class="info-message">🔐 A validar credenciais...</div>
        
        <form id="labForm" style="display: none;">
            <!-- DADOS DA INSTITUIÇÃO -->
            <div class="section-title">
                <span>🏛️</span> Dados da instituição
            </div>
            <div class="grid-2">
                <div class="campo full-width">
                    <label>Nome da instituição <span class="badge-obrigatorio">obrigatório</span></label>
                    <input type="text" id="nome" placeholder="Ex: Hospital Central de Luanda" required>
                </div>
                <div class="campo">
                    <label>NIF <span class="badge-obrigatorio">10 dígitos</span></label>
                    <input type="text" id="nif" maxlength="10" placeholder="1234567890" required>
                </div>
                <div class="campo">
                    <label>Tipo <span class="badge-obrigatorio">obrigatório</span></label>
                    <select id="tipo" required>
                        <option value="laboratorio">Laboratório</option>
                        <option value="hospital">Hospital</option>
                        <option value="clinica">Clínica</option>
                    </select>
                </div>
                <div class="campo">
                    <label>Província <span class="badge-obrigatorio">obrigatório</span></label>
                    <select id="provincia" required>
                        <option value="">Selecione</option>
                        <option value="Bengo">Bengo</option>
                        <option value="Benguela">Benguela</option>
                        <option value="Bié">Bié</option>
                        <option value="Cabinda">Cabinda</option>
                        <option value="Cuando Cubango">Cuando Cubango</option>
                        <option value="Cuanza Norte">Cuanza Norte</option>
                        <option value="Cuanza Sul">Cuanza Sul</option>
                        <option value="Cunene">Cunene</option>
                        <option value="Huambo">Huambo</option>
                        <option value="Huíla">Huíla</option>
                        <option value="Luanda">Luanda</option>
                        <option value="Lunda Norte">Lunda Norte</option>
                        <option value="Lunda Sul">Lunda Sul</option>
                        <option value="Malanje">Malanje</option>
                        <option value="Moxico">Moxico</option>
                        <option value="Namibe">Namibe</option>
                        <option value="Uíge">Uíge</option>
                        <option value="Zaire">Zaire</option>
                    </select>
                </div>
                <div class="campo">
                    <label>Município</label>
                    <input type="text" id="municipio" placeholder="Ex: Ingombota">
                </div>
                <div class="campo full-width">
                    <label>Endereço completo</label>
                    <input type="text" id="endereco" placeholder="Rua, número, bairro">
                </div>
                <div class="campo">
                    <label>Telefone 1</label>
                    <input type="tel" id="telefone" placeholder="923000000">
                </div>
                <div class="campo">
                    <label>Telefone 2 (opcional)</label>
                    <input type="tel" id="telefone2" placeholder="923111111">
                </div>
                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" id="email" placeholder="contato@instituicao.ao">
                </div>
                <div class="campo">
                    <label>Website</label>
                    <input type="url" id="website" placeholder="https://">
                </div>
            </div>

            <!-- RESPONSÁVEIS E LICENÇA -->
            <div class="section-title">
                <span>👥</span> Direção e licenciamento
            </div>
            <div class="grid-2">
                <div class="campo">
                    <label>Diretor geral</label>
                    <input type="text" id="diretor" placeholder="Nome do diretor">
                </div>
                <div class="campo">
                    <label>Responsável técnico</label>
                    <input type="text" id="responsavelTecnico" placeholder="Nome do resp. técnico">
                </div>
                <div class="campo">
                    <label>Licença (nº)</label>
                    <input type="text" id="licenca" placeholder="Ex: 123/2024">
                </div>
                <div class="campo">
                    <label>Validade da licença</label>
                    <input type="date" id="validadeLicenca">
                </div>
                <div class="campo full-width">
                    <label>Observações</label>
                    <textarea id="observacoes" rows="3" placeholder="Informações adicionais..."></textarea>
                </div>
            </div>

            <!-- BOTÕES -->
            <div class="acoes">
                <button type="submit" class="btn-emitir" id="btnSalvar" style="margin-top:0;">📌 Registrar Laboratório</button>
                <button type="button" class="btn-emitir btn-secondary" onclick="window.location.href='/admin-dashboard'" style="margin-top:0;">🔙 Cancelar</button>
            </div>
        </form>

        <!-- Área de resultado (sucesso com API Key) -->
        <div id="resultadoArea" class="hidden"></div>
    </div>
</div>

<script>
    (function() {
        const token = localStorage.getItem('token');
        const loadingEl = document.getElementById('loadingMessage');
        const form = document.getElementById('labForm');
        const resultadoArea = document.getElementById('resultadoArea');
        const btnSalvar = document.getElementById('btnSalvar');

        // Verifica autenticação
        if (!token) {
            loadingEl.innerHTML = '❌ Sessão expirada. <a href="/ministerio" style="color:#006633;font-weight:bold;">Faça login novamente</a>.';
            form.style.display = 'none';
        } else {
            // Valida o token (opcional, pode tentar carregar algo)
            fetch('/api/stats', { headers: { 'Authorization': 'Bearer ' + token } })
                .then(res => {
                    if (!res.ok) throw new Error('Token inválido');
                    loadingEl.innerHTML = '✅ Autenticado como <strong>Ministério da Saúde</strong>';
                    form.style.display = 'block';
                })
                .catch(err => {
                    loadingEl.innerHTML = `❌ Erro de autenticação: ${err.message}. <a href="/ministerio" style="color:#006633;">Tentar novamente</a>`;
                    form.style.display = 'none';
                });
        }

        // Submissão do formulário
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validações básicas
            const nome = document.getElementById('nome').value.trim();
            const nif = document.getElementById('nif').value.trim();
            const provincia = document.getElementById('provincia').value;

            if (!nome || !nif || !provincia) {
                alert('Preencha os campos obrigatórios: Nome, NIF e Província.');
                return;
            }
            if (!/^\d{10}$/.test(nif)) {
                alert('NIF deve conter exatamente 10 dígitos numéricos.');
                return;
            }

            // Recolhe dados
            const dados = {
                nome,
                nif,
                tipo: document.getElementById('tipo').value,
                provincia,
                municipio: document.getElementById('municipio').value.trim(),
                endereco: document.getElementById('endereco').value.trim(),
                telefone: document.getElementById('telefone').value.trim(),
                telefone2: document.getElementById('telefone2').value.trim(),
                email: document.getElementById('email').value.trim(),
                website: document.getElementById('website').value.trim(),
                diretor: document.getElementById('diretor').value.trim(),
                responsavelTecnico: document.getElementById('responsavelTecnico').value.trim(),
                licenca: document.getElementById('licenca').value.trim(),
                validadeLicenca: document.getElementById('validadeLicenca').value,
                observacoes: document.getElementById('observacoes').value.trim(),
                ativo: true
            };

            // Remove campos vazios
            Object.keys(dados).forEach(key => {
                if (dados[key] === '') delete dados[key];
            });

            // Estado de loading
            btnSalvar.disabled = true;
            btnSalvar.textContent = '⏳ Registrando...';
            resultadoArea.classList.add('hidden');

            try {
                const response = await fetch('/api/labs', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(dados)
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.erro || result.message || 'Erro ao registrar');
                }

                // Sucesso: exibe API Key e opções
                resultadoArea.innerHTML = `
                    <div class="resultado-popup">
                        <div class="sucesso">✔ Laboratório registado</div>
                        <p style="margin: 1rem 0;">Chave de acesso (API Key):</p>
                        <div class="api-key">${result.apiKey || 'Chave não fornecida'}</div>
                        <p style="color:#666; font-size:0.9rem;">Guarde esta chave em local seguro. Ela será necessária para o laboratório aceder ao sistema.</p>
                        <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
                            <button class="btn-emitir" style="width:auto; padding:0.8rem 2rem;" onclick="window.open('/admin-dashboard', '_self')">📋 Ir para Dashboard</button>
                            <button class="btn-emitir btn-secondary" style="width:auto; padding:0.8rem 2rem;" id="btnGerarPdf">📄 Gerar PDF</button>
                        </div>
                        <a href="/admin-dashboard" class="link-voltar">← Voltar</a>
                    </div>
                `;
                resultadoArea.classList.remove('hidden');
                form.reset(); // opcional

                // Configurar botão de PDF
                document.getElementById('btnGerarPdf').addEventListener('click', () => gerarPdf({ ...dados, apiKey: result.apiKey }));

            } catch (error) {
                alert('❌ ' + error.message);
            } finally {
                btnSalvar.disabled = false;
                btnSalvar.textContent = '📌 Registrar Laboratório';
            }
        });

        // Função para gerar PDF do laboratório
        async function gerarPdf(labData) {
            try {
                const response = await fetch('/api/labs/pdf', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(labData)
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Erro ao gerar PDF');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Laboratorio_${labData.nome.replace(/\s/g, '_')}.pdf`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                alert('Erro ao gerar PDF: ' + error.message);
            }
        }
    })();
</script>
</body>
</html>
