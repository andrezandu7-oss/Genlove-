<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controlo · Ministério da Saúde</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #004d26; color: white; padding: 20px; }
        .sidebar h2 { font-size: 18px; margin-bottom: 30px; text-align: center; border-bottom: 1px solid #006633; padding-bottom: 10px; }
        .nav-link { display: block; color: white; text-decoration: none; padding: 12px; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: #006633; }

        /* Main Content */
        .main-content { flex: 1; padding: 40px; }
        .header { margin-bottom: 30px; }
        
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
        }
        
        .stat-card { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            text-align: center;
        }
        
        .stat-card h3 { color: #666; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #006633; }
        
        .btn-novo {
            display: inline-block;
            background: #ffa500;
            color: #000;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>MINISTÉRIO DA SAÚDE</h2>
        <a href="#" class="nav-link active">📊 Dashboard</a>
        <a href="/admin-labs" class="nav-link">🏥 Laboratórios</a>
        <a href="/novo-laboratorio" class="btn-novo">+ NOVO LABORATÓRIO</a>
        <br><br>
        <button onclick="sair()" style="width:100%; padding:10px; background:#c62828; color:white; border:none; border-radius:5px; cursor:pointer;">Sair</button>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>📊 Painel de Controlo</h1>
            <p>Bem-vindo, Administrador</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Laboratórios</h3>
                <div class="number" id="qtdLaboratorios">...</div>
            </div>
            <div class="stat-card">
                <h3>Hospitais</h3>
                <div class="number" id="qtdHospitais">...</div>
            </div>
            <div class="stat-card">
                <h3>Empresas</h3>
                <div class="number" id="qtdEmpresas">...</div>
            </div>
            <div class="stat-card" style="border-left: 5px solid #ffa500;">
                <h3>Total Geral</h3>
                <div class="number" id="qtdTotal">...</div>
            </div>
        </div>
    </div>

    <script>
        async function carregarEstatisticas() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/ministerio';
                return;
            }

            try {
                // Chamada para a rota que já existe no seu server.js
                const response = await fetch('/api/stats', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                const data = await response.json();

                if (response.ok) {
                    // MAPEAMENTO DOS DADOS (Aqui está a correção!)
                    // Usamos 'labs' porque é assim que o seu servidor envia
                    document.getElementById('qtdLaboratorios').textContent = data.labs || 0;
                    document.getElementById('qtdHospitais').textContent = data.hospitais || 0;
                    document.getElementById('qtdEmpresas').textContent = data.empresas || 0;
                    
                    // Cálculo do total
                    const total = (data.labs || 0) + (data.hospitais || 0) + (data.empresas || 0);
                    document.getElementById('qtdTotal').textContent = total;
                }
            } catch (error) {
                console.error("Erro ao carregar dados:", error);
            }
        }

        function sair() {
            localStorage.clear();
            window.location.href = '/ministerio';
        }

        // Inicia a carga de dados ao abrir a página
        carregarEstatisticas();
    </script>
</body>
</html>
