<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Registo · SNS Angola</title>
    <style>
        :root { --primary: #006633; --accent: #ffa500; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: "Segoe UI", sans-serif; }
        body { background: #f4f7f6; display: flex; justify-content: center; padding: 40px 20px; }
        .container { max-width: 800px; width: 100%; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 30px; text-align: center; }
        .form-body { padding: 40px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full { grid-column: span 2; }
        .campo { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: bold; color: #555; font-size: 13px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 30px; font-size: 16px; }
        .btn-sec { background: #eee; color: #333; border: none; padding: 15px; border-radius: 8px; cursor: pointer; flex: 1; }
        .hidden { display: none; }
        .revisao-box { background: #f9f9f9; padding: 20px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 20px; line-height: 1.8; }
        .success-box { text-align: center; padding: 20px; }
        .api-key { background: #fff3cd; color: #856404; padding: 15px; border-radius: 8px; font-family: monospace; font-weight: bold; margin: 20px 0; border: 1px dashed #ffeeba; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Ministério da Saúde</h1>
        <p>Registo de Unidade no Sistema Nacional</p>
    </div>

    <div class="form-body">
        <form id="formUnidade">
            <div class="grid">
                <div class="campo full">
                    <label>Nome da Unidade *</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="campo">
                    <label>NIF (10 dígitos) *</label>
                    <input type="text" id="nif" required maxlength="10">
                </div>
                <div class="campo">
                    <label>Tipo de Unidade *</label>
                    <select id="tipo" required>
                        <option value="laboratorio">Laboratório</option>
                        <option value="hospital">Hospital</option>
                        <option value="clinica">Clínica</option>
                    </select>
                </div>
                <div class="campo">
                    <label>Província *</label>
                    <select id="provincia" required>
                        <option value="Luanda">Luanda</option>
                        <option value="Benguela">Benguela</option>
                        <option value="Huambo">Huambo</option>
                        <option value="Huíla">Huíla</option>
                        <option value="Cabinda">Cabinda</option>
                        </select>
                </div>
                <div class="campo">
                    <label>Município</label>
                    <input type="text" id="municipio">
                </div>
                <div class="campo full">
                    <label>Endereço Completo</label>
                    <input type="text" id="endereco">
                </div>
                <div class="campo">
                    <label>Director Geral</label>
                    <input type="text" id="diretor">
                </div>
                <div class="campo">
                    <label>Telefone</label>
                    <input type="text" id="telefone">
                </div>
                <div class="campo full">
                    <label>E-mail Oficial</label>
                    <input type="email" id="email">
                </div>
            </div>
            <button type="button" class="btn-main" onclick="irParaRevisao()">🔍 Revisar Dados</button>
        </form>

        <div id="areaRevisao" class="hidden">
            <h2 style="margin-bottom: 20px; color: var(--primary);">Confirmar Registo</h2>
            <div id="resumoDados" class="revisao-box"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" style="margin-top:0;" onclick="salvarOficialmente()">🚀 Confirmar e Salvar</button>
                <button class="btn-sec" onclick="voltarEdicao()">Editar</button>
            </div>
        </div>

        <div id="areaSucesso" class="hidden">
            <div class="success-box">
                <h2 style="color: var(--primary);">✅ Unidade Registada!</h2>
                <p>O registo foi concluído com sucesso no MongoDB.</p>
                <div class="api-key" id="displayApiKey"></div>
                <p style="font-size: 12px; color: #666;">Guarde esta API Key. Ela é necessária para o login da unidade.</p>
                <button class="btn-main" onclick="window.location.href='/admin-dashboard'">Ir para o Dashboard</button>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = "/ministerio";

    let payload = {};

    function irParaRevisao() {
        payload = {
            nome: document.getElementById('nome').value,
            nif: document.getElementById('nif').value,
            tipo: document.getElementById('tipo').value, // Envoie 'laboratorio', 'hospital' ou 'clinica'
            provincia: document.getElementById('provincia').value,
            municipio: document.getElementById('municipio').value,
            endereco: document.getElementById('endereco').value,
            diretor: document.getElementById('diretor').value,
            telefone: document.getElementById('telefone').value,
            email: document.getElementById('email').value,
            ativo: true
        };

        if(!payload.nome || !payload.nif) return alert("Preencha os campos obrigatórios.");

        document.getElementById('resumoDados').innerHTML = `
            <p><b>Instituição:</b> \${payload.nome}</p>
            <p><b>NIF:</b> \${payload.nif} | <b>Tipo:</b> \${payload.tipo.toUpperCase()}</p>
            <p><b>Local:</b> \${payload.municipio}, \${payload.provincia}</p>
            <p><b>Director:</b> \${payload.diretor}</p>
            <p><b>Contacto:</b> \${payload.telefone} | \${payload.email}</p>
        `;

        document.getElementById('formUnidade').classList.add('hidden');
        document.getElementById('areaRevisao').classList.remove('hidden');
    }

    function voltarEdicao() {
        document.getElementById('areaRevisao').classList.add('hidden');
        document.getElementById('formUnidade').classList.remove('hidden');
    }

    async function salvarOficialmente() {
        try {
            const response = await fetch('/api/labs', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token 
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if(response.ok) {
                document.getElementById('areaRevisao').classList.add('hidden');
                document.getElementById('displayApiKey').innerText = data.apiKey;
                document.getElementById('areaSucesso').classList.remove('hidden');
            } else {
                alert("Erro: " + (data.error || "Falha no servidor"));
            }
        } catch (err) {
            alert("Erro de conexão com Render.");
        }
    }
</script>

</body>
</html>
