<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novo Laboratório · Ministério da Saúde</title>
<style>
/* -- Styles identiques à ton formulaire original pour cohérence -- */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Arial, sans-serif; }
body { background:#006633; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
.container { max-width:800px; width:100%; background:white; border-radius:16px; box-shadow:0 20px 40px rgba(0,0,0,0.2); padding:35px 40px; animation:fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-10px);} to{opacity:1;transform:translateY(0);} }
h1 { color:#006633; font-size:28px; font-weight:600; margin-bottom:8px; border-left:6px solid #006633; padding-left:20px; }
.subtitle { color:#666; margin-bottom:30px; font-size:15px; margin-top:5px; padding-left:26px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px 25px; }
.full-width { grid-column:span 2; }
.campo { display:flex; flex-direction:column; gap:6px; }
.campo label { font-weight:600; color:#333; font-size:14px; display:flex; align-items:center; gap:4px; }
.campo label i { color:#006633; font-style:normal; font-weight:400; }
.campo input, .campo select, .campo textarea { padding:12px 14px; border:1.5px solid #e0e0e0; border-radius:10px; font-size:15px; transition:0.2s; background:#fafafa; }
.campo input:focus, .campo select:focus, .campo textarea:focus { outline:none; border-color:#006633; background:white; box-shadow:0 0 0 3px rgba(0,102,51,0.1); }
.campo input.required, .campo select.required { border-left:4px solid #006633; }
.checkbox-group { display:flex; align-items:center; gap:10px; margin-top:5px; }
.checkbox-group input { width:18px; height:18px; accent-color:#006633; }
.acoes { margin-top:35px; display:flex; justify-content:flex-end; gap:15px; align-items:center; }
.btn { padding:14px 28px; border:none; border-radius:50px; font-size:16px; font-weight:600; cursor:pointer; transition:0.2s; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; }
.btn-primary { background:#006633; color:white; box-shadow:0 4px 12px rgba(0,102,51,0.3); }
.btn-primary:hover { background:#004d26; transform:translateY(-2px); box-shadow:0 8px 18px rgba(0,102,51,0.4); }
.btn-secondary { background:#f1f1f1; color:#333; }
.btn-secondary:hover { background:#e4e4e4; }
#resposta { margin-top:20px; padding:15px; border-radius:12px; display:none; font-size:14px; }
.sucesso { background:#e8f5e9; color:#1e7e34; border:1px solid #a5d6a7; display:block !important; }
.erro { background:#ffebee; color:#b71c1c; border:1px solid #ffcdd2; display:block !important; }
.info-chave { background:#f0f7ff; border:1px dashed #006633; padding:15px; border-radius:12px; margin:20px 0 10px; word-break:break-all; font-family:monospace; font-size:14px; }
.info-chave strong { color:#006633; display:block; margin-bottom:8px; font-size:16px; }
hr { border:none; border-top:2px solid #eee; margin:20px 0; }
.aviso { color:#b71c1c; font-size:13px; margin:10px 0; font-style:italic; }
@media(max-width:650px){.container{padding:25px;}.form-grid{grid-template-columns:1fr;}.full-width{grid-column:span 1;}}
</style>
</head>
<body>
<div class="container">
<h1>➕ NOVO LABORATÓRIO</h1>
<div class="subtitle">Registar ou editar unidade laboratorial no SNS · Angola</div>

<form id="formLab">
<!-- Formulaire identique à ton code original -->
<div class="form-grid">
    <div class="campo full-width">
        <label>🏥 Nome do Laboratório <span style="color:#c62828;">*</span></label>
        <input type="text" id="nome" class="required" placeholder="Ex.: LabCentral Luanda" required>
    </div>
    <div class="campo">
        <label>📄 NIF <span style="color:#c62828;">*</span></label>
        <input type="text" id="nif" class="required" placeholder="10 dígitos" maxlength="10" pattern="\d{10}" title="Deve conter 10 dígitos" required>
    </div>
    <div class="campo">
        <label>⚖️ Tipo <span style="color:#c62828;">*</span></label>
        <select id="tipo" required>
            <option value="">Selecionar</option>
            <option value="Público">Público</option>
            <option value="Privado">Privado</option>
            <option value="Misto">Misto</option>
        </select>
    </div>
    <div class="campo">
        <label>📍 Província <span style="color:#c62828;">*</span></label>
        <select id="provincia" class="required" required>
            <option value="">Selecione a Província</option>
            <option value="Bengo">Bengo</option>
            <option value="Benguela">Benguela</option>
            <option value="Bié">Bié</option>
            <option value="Cabinda">Cabinda</option>
            <option value="Cuando Cubango">Cuando Cubango</option>
            <option value="Cuanza Norte">Cuanza Norte</option>
            <option value="Cuanza Sul">Cuanza Sul</option>
            <option value="Cunene">Cunene</option>
            <option value="Huambo">Huambo</option>
            <option value="Huíla">Huíla</option>
            <option value="Luanda">Luanda</option>
            <option value="Lunda Norte">Lunda Norte</option>
            <option value="Lunda Sul">Lunda Sul</option>
            <option value="Malanje">Malanje</option>
            <option value="Moxico">Moxico</option>
            <option value="Namibe">Namibe</option>
            <option value="Uíge">Uíge</option>
            <option value="Zaire">Zaire</option>
        </select>
    </div>
    <div class="campo">
        <label>🗺️ Município</label>
        <input type="text" id="municipio" placeholder="Ex.: Ingombota">
    </div>
    <div class="campo full-width">
        <label>🏛️ Endereço completo <span style="color:#c62828;">*</span></label>
        <input type="text" id="endereco" class="required" placeholder="Rua, número, bairro" required>
    </div>
    <div class="campo">
        <label>📞 Telefone 1 <span style="color:#c62828;">*</span></label>
        <input type="tel" id="telefone" class="required" placeholder="+244 900 000 000" required>
    </div>
    <div class="campo">
        <label>📞 Telefone 2</label>
        <input type="tel" id="telefone2" placeholder="Opcional">
    </div>
    <div class="campo">
        <label>✉️ Email <span style="color:#c62828;">*</span></label>
        <input type="email" id="email" class="required" placeholder="lab@exemplo.ao" required>
    </div>
    <div class="campo">
        <label>🌐 Website</label>
        <input type="url" id="website" placeholder="https://...">
    </div>
    <div class="campo">
        <label>👨‍⚕️ Diretor <span style="color:#c62828;">*</span></label>
        <input type="text" id="diretor" class="required" placeholder="Nome completo" required>
    </div>
    <div class="campo">
        <label>🧪 Responsável Técnico</label>
        <input type="text" id="responsavelTecnico" placeholder="Se diferente do diretor">
    </div>
    <div class="campo">
        <label>📜 Nº Licença</label>
        <input type="text" id="licenca" placeholder="Ex.: 1234/MINSAL/25">
    </div>
    <div class="campo full-width">
        <label>📅 Validade da Licença</label>
        <div style="display:flex; gap:10px;">
            <select id="validadeDia" style="width:100px;"><option value="">Dia</option></select>
            <select id="validadeMes" style="width:100px;">
                <option value="">Mês</option>
                <option value="1">Janeiro</option><option value="2">Fevereiro</option><option value="3">Março</option>
                <option value="4">Abril</option><option value="5">Maio</option><option value="6">Junho</option>
                <option value="7">Julho</option><option value="8">Agosto</option><option value="9">Setembro</option>
                <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
            </select>
            <select id="validadeAno" style="flex:1;"><option value="">Ano</option></select>
        </div>
    </div>
    <div class="campo full-width checkbox-group">
        <input type="checkbox" id="ativo" checked>
        <label for="ativo" style="font-weight:500;">✅ Laboratório ativo (pode emitir certificados)</label>
    </div>
</div>

<hr>

<div class="acoes">
    <a href="/admin-dashboard" class="btn btn-secondary">← Cancelar</a>
    <button type="submit" class="btn btn-primary" id="btnSalvar">💾 Registar Laboratório</button>
</div>

<div id="resposta"></div>
</div>

<script>
(async function() {
    const token = localStorage.getItem('token');
    if(!token){ alert('Sessão expirada'); window.location.href='/ministerio'; return; }

    const form = document.getElementById('formLab');
    const btnSalvar = document.getElementById('btnSalvar');
    const respostaDiv = document.getElementById('resposta');

    const anoSelect = document.getElementById('validadeAno');
    for(let a=1900;a<=2100;a++){ let option=document.createElement('option'); option.value=a; option.textContent=a; anoSelect.appendChild(option); }

    function atualizarDias(){
        const diaSelect = document.getElementById('validadeDia');
        const mes = parseInt(document.getElementById('validadeMes').value);
        const ano = parseInt(document.getElementById('validadeAno').value);
        let diasNoMes = 31;
        if(mes){ if([4,6,9,11].includes(mes)){ diasNoMes=30;} else if(mes===2){ diasNoMes=(ano && ((ano%4===0 && ano%100!==0) || (ano%400===0)))?29:28; } }
        diaSelect.innerHTML='<option value="">Dia</option>';
        for(let d=1;d<=diasNoMes;d++){ const o=document.createElement('option'); o.value=d; o.textContent=d; diaSelect.appendChild(o); }
    }
    document.getElementById('validadeMes').addEventListener('change', atualizarDias);
    document.getElementById('validadeAno').addEventListener('change', atualizarDias);
    atualizarDias();

    let labIdToEdit = localStorage.getItem('editLabId');
    if(labIdToEdit){
        try{
            const res = await fetch(`/api/labs/${labIdToEdit}`, { headers:{ 'Authorization':'Bearer '+token } });
            if(res.ok){
                const lab = await res.json();
                // Remplissage du formulaire
                document.getElementById('nome').value = lab.nome || '';
                document.getElementById('nif').value = lab.nif || '';
                document.getElementById('tipo').value = lab.tipo || '';
                document.getElementById('provincia').value = lab.provincia || '';
                document.getElementById('municipio').value = lab.municipio || '';
                document.getElementById('endereco').value = lab.endereco || '';
                document.getElementById('telefone').value = lab.telefone || '';
                document.getElementById('telefone2').value = lab.telefone2 || '';
                document.getElementById('email').value = lab.email || '';
                document.getElementById('website').value = lab.website || '';
                document.getElementById('diretor').value = lab.diretor || '';
                document.getElementById('responsavelTecnico').value = lab.responsavelTecnico || '';
                document.getElementById('licenca').value = lab.licenca || '';
                if(lab.validadeLicenca){ 
                    const [y,m,d]=lab.validadeLicenca.split('-'); 
                    document.getElementById('validadeAno').value=y;
                    document.getElementById('validadeMes').value=parseInt(m);
                    setTimeout(()=>{document.getElementById('validadeDia').value=parseInt(d);},10);
                }
                document.getElementById('ativo').checked = lab.ativo !== false;
            }
        }catch(e){ console.error(e); }
    }

    form.addEventListener('submit', async e=>{
        e.preventDefault();
        btnSalvar.disabled=true;
        btnSalvar.textContent='⏳ Salvando...';

        const dia=document.getElementById('validadeDia').value.padStart(2,'0');
        const mes=document.getElementById('validadeMes').value.padStart(2,'0');
        const ano=document.getElementById('validadeAno').value;
        const validadeLicenca=(dia && mes && ano)?`${ano}-${mes}-${dia}`:undefined;

        const dados={
            nome: document.getElementById('nome').value.trim(),
            nif: document.getElementById('nif').value.trim(),
            tipo: document.getElementById('tipo').value,
            provincia: document.getElementById('provincia').value,
            municipio: document.getElementById('municipio').value.trim()||undefined,
            endereco: document.getElementById('endereco').value.trim(),
            telefone: document.getElementById('telefone').value.trim(),
            telefone2: document.getElementById('telefone2').value.trim()||undefined,
            email: document.getElementById('email').value.trim(),
            website: document.getElementById('website').value.trim()||undefined,
            diretor: document.getElementById('diretor').value.trim(),
            responsavelTecnico: document.getElementById('responsavelTecnico').value.trim()||undefined,
            licenca: document.getElementById('licenca').value.trim()||undefined,
            validadeLicenca,
            ativo: document.getElementById('ativo').checked
        };

        try{
            const url = labIdToEdit ? `/api/labs/${labIdToEdit}` : '/api/labs';
            const method = labIdToEdit ? 'PUT' : 'POST';
            const res = await fetch(url, {
                method,
                headers:{ 'Content-Type':'application/json','Authorization':'Bearer '+token },
                body: JSON.stringify(dados)
            });
            const result = await res.json();
            if(res.ok && result.success){
                localStorage.removeItem('editLabId');
                alert('✅ Laboratório salvo com sucesso!');
                window.location.href='/admin-dashboard';
            }else{
                respostaDiv.className='erro';
                respostaDiv.innerHTML='❌ '+(result.error||'Erro ao salvar laboratório.');
                respostaDiv.style.display='block';
            }
        }catch(err){
            respostaDiv.className='erro';
            respostaDiv.innerHTML='❌ Erro de conexão ao servidor.';
            respostaDiv.style.display='block';
        }finally{
            btnSalvar.disabled=false;
            btnSalvar.textContent='💾 Registar Laboratório';
        }
    });
})();
</script>
</body>
</html>
