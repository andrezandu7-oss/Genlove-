<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Laboratório · SNS Angola</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f0f4f0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 40, 20, 0.15);
            overflow: hidden;
            border: 1px solid rgba(0, 102, 51, 0.2);
        }
        .header {
            background: #006633;
            color: white;
            padding: 1.8rem 2.5rem;
        }
        .header h1 {
            font-weight: 600;
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 span {
            background: #ffcc00;
            color: #006633;
            font-size: 0.9rem;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 500;
        }
        .header p {
            opacity: 0.85;
            margin-top: 8px;
            font-size: 1rem;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            margin-top: 12px;
            display: inline-block;
            background: rgba(255,255,255,0.15);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .header a:hover {
            background: rgba(255,255,255,0.25);
        }
        .form-card {
            padding: 2.5rem;
        }
        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #006633;
            border-bottom: 2px solid #cce8d5;
            padding-bottom: 0.5rem;
            margin: 2rem 0 1.5rem 0;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.2rem;
        }
        .campo {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 0.5rem;
        }
        .campo.full-width {
            grid-column: span 2;
        }
        label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #2d4a3b;
        }
        .required::after {
            content: " *";
            color: #cc3300;
            font-weight: bold;
        }
        input, select, textarea {
            padding: 12px 14px;
            border: 1.5px solid #d0ded5;
            border-radius: 16px;
            font-size: 0.95rem;
            background: white;
            transition: 0.2s;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #006633;
            box-shadow: 0 0 0 3px rgba(0, 102, 51, 0.2);
        }
        .btn-registar {
            background: #006633;
            color: white;
            border: none;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 1.2rem 2rem;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 2.5rem;
            box-shadow: 0 8px 16px rgba(0, 102, 51, 0.3);
            letter-spacing: 0.5px;
        }
        .btn-registar:hover {
            background: #008040;
            transform: scale(1.02);
        }
        .btn-registar:disabled {
            background: #99bbaa;
            box-shadow: none;
            cursor: not-allowed;
        }
        .resposta {
            background: #f4faf6;
            border-radius: 24px;
            padding: 2rem;
            margin-top: 2rem;
            border-left: 6px solid #006633;
        }
        .resposta .sucesso {
            color: #006633;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .resposta .api-key {
            background: #ffcc00;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            font-family: monospace;
            font-size: 1.2rem;
            word-break: break-all;
            margin: 1rem 0;
        }
        .erro {
            color: #b33;
            background: #ffe5e5;
            padding: 1rem;
            border-radius: 16px;
            margin-top: 1rem;
        }
        .hidden {
            display: none;
        }
        .spinner {
            border: 5px solid #e6f0ea;
            border-top: 5px solid #006633;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        small {
            color: #5f7a6b;
            font-size: 0.8rem;
        }
        .inline-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>
            🏥 Novo Laboratório
            <span>MINISTÉRIO DA SAÚDE</span>
        </h1>
        <p>Preencha os dados para registar um novo laboratório no SNS</p>
        <a href="/admin-dashboard">← Voltar ao painel</a>
    </div>

    <div class="form-card">
        <!-- Mensagem de carregamento/erro de autenticação -->
        <div id="authMessage" class="erro hidden"></div>

        <form id="labForm" style="display: none;">
            <!-- Informações básicas -->
            <div class="section-title">Informações básicas</div>
            <div class="grid-2">
                <div class="campo full-width">
                    <label class="required">Nome do laboratório</label>
                    <input type="text" id="nome" name="nome" required placeholder="Ex: Laboratório Central de Luanda">
                </div>
                <div class="campo">
                    <label class="required">NIF</label>
                    <input type="text" id="nif" name="nif" required pattern="\d{10}" maxlength="10" placeholder="1234567890">
                    <small>10 dígitos numéricos</small>
                </div>
                <div class="campo">
                    <label class="required">Tipo</label>
                    <select id="tipo" name="tipo" required>
                        <option value="" disabled selected>— Selecione —</option>
                        <option value="Público">Público</option>
                        <option value="Privado">Privado</option>
                        <option value="Misto">Misto</option>
                    </select>
                </div>
                <div class="campo full-width">
                    <label class="required">Província</label>
                    <input type="text" id="provincia" name="provincia" required placeholder="Ex: Luanda, Benguela, Huíla...">
                </div>
                <div class="campo">
                    <label>Município</label>
                    <input type="text" id="municipio" name="municipio" placeholder="Ex: Ingombota">
                </div>
                <div class="campo full-width">
                    <label class="required">Endereço completo</label>
                    <input type="text" id="endereco" name="endereco" required placeholder="Rua, número, bairro">
                </div>
            </div>

            <!-- Contactos -->
            <div class="section-title">Contactos</div>
            <div class="grid-2">
                <div class="campo">
                    <label class="required">Telefone 1</label>
                    <input type="tel" id="telefone" name="telefone" required placeholder="+244 999 999 999">
                </div>
                <div class="campo">
                    <label>Telefone 2 (opcional)</label>
                    <input type="tel" id="telefone2" name="telefone2" placeholder="Outro número">
                </div>
                <div class="campo full-width">
                    <label class="required">E-mail</label>
                    <input type="email" id="email" name="email" required placeholder="lab@exemplo.ao">
                </div>
                <div class="campo full-width">
                    <label>Website (opcional)</label>
                    <input type="url" id="website" name="website" placeholder="https://">
                </div>
            </div>

            <!-- Responsáveis -->
            <div class="section-title">Responsáveis</div>
            <div class="grid-2">
                <div class="campo full-width">
                    <label class="required">Diretor geral</label>
                    <input type="text" id="diretor" name="diretor" required placeholder="Nome completo">
                </div>
                <div class="campo full-width">
                    <label>Responsável técnico (opcional)</label>
                    <input type="text" id="responsavelTecnico" name="responsavelTecnico" placeholder="Nome do responsável técnico">
                </div>
            </div>

            <!-- Licenciamento (opcional) -->
            <div class="section-title">Licenciamento (opcional)</div>
            <div class="grid-2">
                <div class="campo">
                    <label>Nº da licença</label>
                    <input type="text" id="licenca" name="licenca" placeholder="Ex: LIC-2025/001">
                </div>
                <div class="campo">
                    <label>Validade da licença</label>
                    <input type="date" id="validadeLicenca" name="validadeLicenca">
                </div>
            </div>

            <!-- Botão de registo -->
            <button type="submit" class="btn-registar" id="btnRegistar">✅ Registar Laboratório</button>
        </form>

        <!-- Área de resposta após registo -->
        <div id="resultadoArea" class="hidden"></div>
        <div id="spinnerArea" class="hidden"><div class="spinner"></div></div>
    </div>
</div>

<script>
    (function() {
        const token = localStorage.getItem('token');
        const authMessage = document.getElementById('authMessage');
        const labForm = document.getElementById('labForm');
        const resultadoArea = document.getElementById('resultadoArea');
        const spinnerArea = document.getElementById('spinnerArea');
        const btnRegistar = document.getElementById('btnRegistar');

        // Verificar token
        if (!token) {
            authMessage.classList.remove('hidden');
            authMessage.innerHTML = '❌ Sessão de administrador não encontrada. <a href="/ministerio" style="color:#006633;">Fazer login</a>';
            labForm.style.display = 'none';
        } else {
            // Opcional: verificar se token é válido com uma chamada simples (ex: /api/stats)
            fetch('/api/stats', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(res => {
                if (!res.ok) throw new Error('Token inválido ou expirado');
                labForm.style.display = 'block';
            })
            .catch(err => {
                authMessage.classList.remove('hidden');
                authMessage.innerHTML = '❌ Sessão inválida. <a href="/ministerio" style="color:#006633;">Reautenticar</a>';
                labForm.style.display = 'none';
            });
        }

        // Submissão do formulário
        labForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Recolher dados
            const formData = {
                nome: document.getElementById('nome').value.trim(),
                nif: document.getElementById('nif').value.trim(),
                tipo: document.getElementById('tipo').value,
                provincia: document.getElementById('provincia').value.trim(),
                municipio: document.getElementById('municipio').value.trim() || undefined,
                endereco: document.getElementById('endereco').value.trim(),
                telefone: document.getElementById('telefone').value.trim(),
                telefone2: document.getElementById('telefone2').value.trim() || undefined,
                email: document.getElementById('email').value.trim(),
                website: document.getElementById('website').value.trim() || undefined,
                diretor: document.getElementById('diretor').value.trim(),
                responsavelTecnico: document.getElementById('responsavelTecnico').value.trim() || undefined,
                licenca: document.getElementById('licenca').value.trim() || undefined,
                validadeLicenca: document.getElementById('validadeLicenca').value || undefined
            };

            // Validação simples (os campos required já garantem, mas duplicamos)
            if (!formData.nome || !formData.nif || !formData.tipo || !formData.provincia || !formData.endereco || !formData.telefone || !formData.email || !formData.diretor) {
                alert('Preencha todos os campos obrigatórios.');
                return;
            }
            if (!/^\d{10}$/.test(formData.nif)) {
                alert('NIF deve ter exatamente 10 dígitos.');
                return;
            }

            // Desabilitar botão e mostrar spinner
            btnRegistar.disabled = true;
            btnRegistar.textContent = '⏳ Registando...';
            resultadoArea.classList.add('hidden');
            spinnerArea.classList.remove('hidden');

            try {
                const response = await fetch('/api/labs', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                spinnerArea.classList.add('hidden');

                if (!response.ok) {
                    // Exibir erro detalhado
                    let erroMsg = data.error || 'Erro desconhecido';
                    if (data.errors) {
                        erroMsg = Object.values(data.errors).map(e => e.message).join(', ');
                    }
                    throw new Error(erroMsg);
                }

                // Sucesso: mostrar API Key e labId
                resultadoArea.innerHTML = `
                    <div class="resposta">
                        <div class="sucesso">✔ Laboratório registado com sucesso!</div>
                        <p><strong>Lab ID:</strong> ${data.labId}</p>
                        <p><strong>API Key (guardar com segurança):</strong></p>
                        <div class="api-key">${data.apiKey}</div>
                        <p style="margin-top: 1rem;">
                            <button class="btn-registar" style="width: auto; padding: 0.8rem 2rem;" onclick="window.location.href='/admin-dashboard'">
                                Ir para o dashboard
                            </button>
                            <button class="btn-registar" style="width: auto; padding: 0.8rem 2rem; background: #ffaa00; color: #00331a;" onclick="window.print()">
                                🖨️ Imprimir
                            </button>
                        </p>
                        <p><small>A chave API não poderá ser recuperada novamente. Guarde-a num local seguro.</small></p>
                    </div>
                `;
                resultadoArea.classList.remove('hidden');
                labForm.reset(); // limpa o formulário
            } catch (error) {
                spinnerArea.classList.add('hidden');
                resultadoArea.innerHTML = `<div class="erro">❌ Erro: ${error.message}</div>`;
                resultadoArea.classList.remove('hidden');
            } finally {
                btnRegistar.disabled = false;
                btnRegistar.textContent = '✅ Registar Laboratório';
            }
        });
    })();
</script>
</body>
</html>
