<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Laboratório - Ministério da Saúde</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { 
            background: linear-gradient(135deg, #006633 0%, #004d26 100%); 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 20px 40px rgba(0,102,51,0.3); 
            overflow: hidden;
        }
        .header {
            background: linear-gradient(90deg, #006633, #00a651);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 16px; }
        .form-container { padding: 40px; }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group.full { grid-column: span 2; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #333; 
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8f9fa;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #006633;
            background: white;
            box-shadow: 0 0 0 3px rgba(0,102,51,0.1);
        }
        textarea { resize: vertical; min-height: 100px; }
        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary { 
            background: #006633; 
            color: white; 
            margin-right: 15px;
        }
        .btn-primary:hover { background: #004d26; transform: translateY(-2px); }
        .btn-secondary { 
            background: #6c757d; 
            color: white; 
        }
        .btn-secondary:hover { background: #545b62; transform: translateY(-2px); }
        .btn-group { text-align: center; margin-top: 40px; }
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .section-title {
            grid-column: span 2;
            text-align: center;
            font-size: 22px;
            color: #006633;
            margin: 30px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 3px solid #006633;
        }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full, .section-title { grid-column: span 1; }
            .form-container { padding: 20px; }
            .btn-group { flex-direction: column; }
            .btn { margin-bottom: 10px; width: 100%; }
        }
        .required { color: #dc3545; }
        .nif-validator { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Novo Laboratório</h1>
            <p>Registre um novo laboratório no Sistema Nacional de Saúde</p>
        </div>
        
        <div class="form-container">
            <div id="alert" style="display: none;"></div>
            
            <!-- INFORMAÇÕES BÁSICAS -->
            <div class="section-title">📋 Informações Básicas</div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="nome">Nome do Laboratório <span class="required">*</span></label>
                    <input type="text" id="nome" required maxlength="100">
                </div>
                <div class="form-group">
                    <label for="nif">NIF <span class="required">*</span></label>
                    <input type="text" id="nif" required maxlength="14" placeholder="1234567890">
                    <div class="nif-validator">Deve conter 10 dígitos numéricos</div>
                </div>
                <div class="form-group">
                    <label for="tipo">Tipo <span class="required">*</span></label>
                    <select id="tipo" required>
                        <option value="">Selecione...</option>
                        <option value="Público">🏥 Público</option>
                        <option value="Privado">🏢 Privado</option>
                        <option value="Misto">🔗 Misto</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="provincia">Província <span class="required">*</span></label>
                    <select id="provincia" required onchange="updateMunicipios()">
                        <option value="">Selecione...</option>
                        <option value="Luanda">Luanda</option>
                        <option value="Bengo">Bengo</option>
                        <option value="Benguela">Benguela</option>
                        <option value="Bié">Bié</option>
                        <option value="Cabinda">Cabinda</option>
                        <option value="Cuando Cubango">Cuando Cubango</option>
                        <option value="Cuanza Norte">Cuanza Norte</option>
                        <option value="Cuanza Sul">Cuanza Sul</option>
                        <option value="Cunene">Cunene</option>
                        <option value="Huambo">Huambo</option>
                        <option value="Huíla">Huíla</option>
                        <option value="Lunda Norte">Lunda Norte</option>
                        <option value="Lunda Sul">Lunda Sul</option>
                        <option value="Malanje">Malanje</option>
                        <option value="Moxico">Moxico</option>
                        <option value="Namibe">Namibe</option>
                        <option value="Uíge">Uíge</option>
                        <option value="Zaire">Zaire</option>
                    </select>
                </div>
            </div>

            <!-- LOCALIZAÇÃO -->
            <div class="section-title">📍 Localização</div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="municipio">Município</label>
                    <input type="text" id="municipio" placeholder="Ex: Talatona, Viana...">
                </div>
                <div class="form-group">
                    <label for="endereco">Endereço Completo <span class="required">*</span></label>
                    <input type="text" id="endereco" required maxlength="200" placeholder="Rua, número, bairro...">
                </div>
            </div>

            <!-- CONTACTOS -->
            <div class="section-title">📞 Contactos</div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="telefone">Telefone Principal <span class="required">*</span></label>
                    <input type="tel" id="telefone" required placeholder="923 456 789">
                </div>
                <div class="form-group">
                    <label for="telefone2">Telefone Secundário</label>
                    <input type="tel" id="telefone2" placeholder="912 345 678">
                </div>
                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" required placeholder="contato@laboratorio.ao">
                </div>
                <div class="form-group">
                    <label for="website">Website (opcional)</label>
                    <input type="url" id="website" placeholder="www.laboratorio.ao">
                </div>
            </div>

            <!-- RESPONSÁVEIS -->
            <div class="section-title">👨‍⚕️ Responsáveis</div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="diretor">Diretor <span class="required">*</span></label>
                    <input type="text" id="diretor" required maxlength="100" placeholder="Dr. João Silva">
                </div>
                <div class="form-group">
                    <label for="responsavelTecnico">Responsável Técnico</label>
                    <input type="text" id="responsavelTecnico" maxlength="100" placeholder="Dr. Maria Santos">
                </div>
            </div>

            <!-- LICENCIAMENTO -->
            <div class="section-title">📜 Licenciamento</div>
            <div class="form-grid">
                <div class="form-group full">
                    <label for="licenca">Número da Licença</label>
                    <input type="text" id="licenca" placeholder="LIC-2025-001">
                </div>
                <div class="form-group">
                    <label for="validadeLicenca">Validade da Licença</label>
                    <input type="date" id="validadeLicenca">
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="salvarLaboratorio()">💾 SALVAR LABORATÓRIO</button>
                <a href="/admin-dashboard" class="btn btn-secondary">← VOLTAR AO DASHBOARD</a>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "/ministerio";
        }

        const municipios = {
            "Luanda": ["Talatona", "Viana", "Cacuaco", "Kiamba", "Ingombota", "Maianga"],
            "Benguela": ["Benguela", "Lobito", "Baía Farta"],
            "Huambo": ["Huambo", "Caála", "Mungo"],
            "Huíla": ["Lubango", "Quilengues", "Cacula"]
        };

        function updateMunicipios() {
            const provincia = document.getElementById('provincia').value;
            const municipio = document.getElementById('municipio');
            if (municipios[provincia]) {
                municipio.placeholder = `Ex: ${municipios[provincia][0]}`;
            } else {
                municipio.placeholder = "Ex: Município";
            }
        }

        // Validação NIF
        document.getElementById('nif').addEventListener('input', function(e) {
            let value = e.target.value.replace(/D/g, '').slice(0, 10);
            e.target.value = value;
            e.target.setCustomValidity(value.length === 10 ? '' : 'NIF deve ter 10 dígitos');
        });

        function mostrarAlerta(mensagem, tipo = 'success') {
            const alert = document.getElementById('alert');
            alert.textContent = mensagem;
            alert.className = `alert alert-${tipo}`;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 5000);
        }

        async function salvarLaboratorio() {
            // Validações
            const camposObrigatorios = ['nome', 'nif', 'tipo', 'provincia', 'endereco', 'telefone', 'email', 'diretor'];
            for (let campo of camposObrigatorios) {
                if (!document.getElementById(campo).value.trim()) {
                    mostrarAlerta(`Por favor, preencha o campo ${campo}`, 'error');
                    document.getElementById(campo).focus();
                    return;
                }
            }

            if (document.getElementById('nif').value.length !== 10) {
                mostrarAlerta('NIF deve conter exatamente 10 dígitos', 'error');
                return;
            }

            const dados = {
                nome: document.getElementById('nome').value,
                nif: document.getElementById('nif').value,
                tipo: document.getElementById('tipo').value,
                provincia: document.getElementById('provincia').value,
                municipio: document.getElementById('municipio').value || '',
                endereco: document.getElementById('endereco').value,
                telefone: document.getElementById('telefone').value,
                telefone2: document.getElementById('telefone2').value || '',
                email: document.getElementById('email').value,
                website: document.getElementById('website').value || '',
                diretor: document.getElementById('diretor').value,
                responsavelTecnico: document.getElementById('responsavelTecnico').value || '',
                licenca: document.getElementById('licenca').value || '',
                validadeLicenca: document.getElementById('validadeLicenca').value || ''
            };

            try {
                const response = await fetch('/api/labs/novo', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(dados)
                });

                const resultado = await response.json();

                if (response.ok) {
                    mostrarAlerta(`✅ Laboratório "${dados.nome}" registrado com sucesso! API Key: ${resultado.apiKey}`, 'success');
                    document.querySelector('form').reset();
                    setTimeout(() => window.location.href = '/admin-dashboard', 2000);
                } else {
                    mostrarAlerta(`❌ Erro: ${resultado.error || 'Erro desconhecido'}`, 'error');
                }
            } catch (error) {
                mostrarAlerta('❌ Erro de conexão: ' + error.message, 'error');
            }
        }

        // Enter para submit
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') salvarLaboratorio();
        });
    </script>
</body>
</html>
