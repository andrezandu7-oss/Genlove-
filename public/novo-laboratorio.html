<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Laboratórios · SNS Angola</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f0f4f0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 40, 20, 0.15);
            overflow: hidden;
            border: 1px solid rgba(0, 102, 51, 0.2);
        }
        .header {
            background: #006633;
            color: white;
            padding: 2rem 2.5rem;
        }
        .header h1 {
            font-weight: 600;
            font-size: 2rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 span {
            background: #ffcc00;
            color: #006633;
            font-size: 1rem;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 500;
        }
        .header p {
            opacity: 0.85;
            margin-top: 6px;
            font-size: 1rem;
        }
        .content {
            padding: 2rem 2.5rem;
        }
        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #006633;
            border-bottom: 2px solid #cce8d5;
            padding-bottom: 0.5rem;
            margin: 2rem 0 1.5rem 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title:first-of-type {
            margin-top: 0;
        }
        .badge-obrigatorio {
            color: #cc3300;
            font-size: 0.7rem;
            margin-left: 5px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }
        .campo {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 0.8rem;
        }
        .campo.full-width {
            grid-column: span 2;
        }
        label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #2d4a3b;
        }
        input, select, textarea {
            padding: 12px 14px;
            border: 1.5px solid #d0ded5;
            border-radius: 14px;
            font-size: 0.95rem;
            background: white;
            transition: 0.2s;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #006633;
            box-shadow: 0 0 0 3px rgba(0, 102, 51, 0.2);
        }
        .btn-principal {
            background: #006633;
            color: white;
            border: none;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 1rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 8px 16px rgba(0, 102, 51, 0.3);
            letter-spacing: 0.5px;
        }
        .btn-principal:hover {
            background: #008040;
            transform: scale(1.02);
        }
        .btn-principal:disabled {
            background: #99bbaa;
            box-shadow: none;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.15s;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .btn-acao {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0 5px;
            transition: 0.1s;
        }
        .btn-acao:hover {
            transform: scale(1.2);
        }
        .acoes {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }
        .info-message {
            color: #2c5e3f;
            background: #e0f0e5;
            padding: 1rem;
            border-radius: 16px;
            font-size: 0.9rem;
            border-left: 4px solid #ffaa00;
            margin-bottom: 1.5rem;
        }
        .tabela-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            overflow-x: auto;
            margin-top: 1.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }
        th {
            background: #f8f9fa;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            padding: 1.2rem 1rem;
            text-align: left;
            border-bottom: 2px solid #e0e0e0;
        }
        td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }
        tr:hover {
            background: #fafafa;
        }
        .status-badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8rem;
            display: inline-block;
        }
        .status-badge.inativo {
            background: #ffebee;
            color: #c62828;
        }
        .cabecalho-tabela {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .hidden {
            display: none;
        }
        .loading-spinner {
            border: 5px solid #e6f0ea;
            border-top: 5px solid #006633;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>
            🏥 Laboratórios / Hospitais
            <span>MINSA</span>
        </h1>
        <p>Registo e gestão de unidades sanitárias no Sistema Nacional de Saúde</p>
    </div>

    <div class="content">
        <!-- Mensagem de autenticação -->
        <div id="loadingMessage" class="info-message">🔐 A validar credenciais...</div>

        <!-- Formulário de registo -->
        <form id="labForm" style="display: none;">
            <div class="section-title">
                <span>➕</span> Novo registo
            </div>
            <div class="grid-2">
                <div class="campo full-width">
                    <label>Nome da instituição <span class="badge-obrigatorio">obrigatório</span></label>
                    <input type="text" id="nome" placeholder="Ex: Hospital Central de Luanda" required>
                </div>
                <div class="campo">
                    <label>NIF <span class="badge-obrigatorio">10 dígitos</span></label>
                    <input type="text" id="nif" maxlength="10" placeholder="1234567890" required>
                </div>
                <div class="campo">
                    <label>Tipo <span class="badge-obrigatorio">obrigatório</span></label>
                    <select id="tipo" required>
                        <option value="laboratorio">Laboratório</option>
                        <option value="hospital">Hospital</option>
                        <option value="clinica">Clínica</option>
                    </select>
                </div>
                <div class="campo">
                    <label>Província <span class="badge-obrigatorio">obrigatório</span></label>
                    <select id="provincia" required>
                        <option value="">Selecione</option>
                        <option value="Bengo">Bengo</option>
                        <option value="Benguela">Benguela</option>
                        <option value="Bié">Bié</option>
                        <option value="Cabinda">Cabinda</option>
                        <option value="Cuando Cubango">Cuando Cubango</option>
                        <option value="Cuanza Norte">Cuanza Norte</option>
                        <option value="Cuanza Sul">Cuanza Sul</option>
                        <option value="Cunene">Cunene</option>
                        <option value="Huambo">Huambo</option>
                        <option value="Huíla">Huíla</option>
                        <option value="Luanda">Luanda</option>
                        <option value="Lunda Norte">Lunda Norte</option>
                        <option value="Lunda Sul">Lunda Sul</option>
                        <option value="Malanje">Malanje</option>
                        <option value="Moxico">Moxico</option>
                        <option value="Namibe">Namibe</option>
                        <option value="Uíge">Uíge</option>
                        <option value="Zaire">Zaire</option>
                    </select>
                </div>
                <div class="campo">
                    <label>Município</label>
                    <input type="text" id="municipio" placeholder="Ex: Ingombota">
                </div>
                <div class="campo full-width">
                    <label>Endereço completo</label>
                    <input type="text" id="endereco" placeholder="Rua, número, bairro">
                </div>
                <div class="campo">
                    <label>Telefone 1</label>
                    <input type="tel" id="telefone" placeholder="923000000">
                </div>
                <div class="campo">
                    <label>Telefone 2</label>
                    <input type="tel" id="telefone2" placeholder="923111111">
                </div>
                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" id="email" placeholder="contato@instituicao.ao">
                </div>
                <div class="campo">
                    <label>Website</label>
                    <input type="url" id="website" placeholder="https://">
                </div>
                <div class="campo">
                    <label>Diretor geral</label>
                    <input type="text" id="diretor" placeholder="Nome do diretor">
                </div>
                <div class="campo">
                    <label>Responsável técnico</label>
                    <input type="text" id="responsavelTecnico" placeholder="Nome do resp. técnico">
                </div>
                <div class="campo">
                    <label>Licença (nº)</label>
                    <input type="text" id="licenca" placeholder="Ex: 123/2024">
                </div>
                <div class="campo">
                    <label>Validade da licença</label>
                    <input type="date" id="validadeLicenca">
                </div>
                <div class="campo full-width">
                    <label>Observações</label>
                    <textarea id="observacoes" rows="2" placeholder="Informações adicionais..."></textarea>
                </div>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button type="submit" class="btn-principal" id="btnSalvar">📌 Registrar</button>
                <button type="button" class="btn-secondary" onclick="limparFormulario()">Limpar</button>
            </div>
        </form>

        <!-- Lista de laboratórios -->
        <div class="section-title" style="margin-top: 3rem;">
            <span>📋</span> Laboratórios registados
        </div>
        <div class="cabecalho-tabela">
            <span id="totalLabs" style="font-weight: 600;"></span>
            <button class="btn-secondary" onclick="carregarLaboratorios()">🔄 Atualizar</button>
        </div>
        <div id="tabelaContainer" class="tabela-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>NIF</th>
                        <th>Província</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaCorpo">
                    <tr><td colspan="5" style="text-align: center; padding: 2rem;">Carregando...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Área de resultado do registo (API Key) -->
        <div id="resultadoArea" class="hidden"></div>
    </div>
</div>

<script>
    (function() {
        const token = localStorage.getItem('token');
        const loadingEl = document.getElementById('loadingMessage');
        const form = document.getElementById('labForm');
        const btnSalvar = document.getElementById('btnSalvar');
        const resultadoArea = document.getElementById('resultadoArea');
        const tabelaCorpo = document.getElementById('tabelaCorpo');
        const totalLabs = document.getElementById('totalLabs');

        // Verifica autenticação
        if (!token) {
            loadingEl.innerHTML = '❌ Sessão expirada. <a href="/ministerio" style="color:#006633;font-weight:bold;">Faça login novamente</a>.';
            form.style.display = 'none';
        } else {
            // Valida o token e carrega laboratórios
            fetch('/api/stats', { headers: { 'Authorization': 'Bearer ' + token } })
                .then(res => {
                    if (!res.ok) throw new Error('Token inválido');
                    loadingEl.innerHTML = '✅ Autenticado como <strong>Ministério da Saúde</strong>';
                    form.style.display = 'block';
                    carregarLaboratorios(); // carrega lista após validação
                })
                .catch(err => {
                    loadingEl.innerHTML = `❌ Erro de autenticação: ${err.message}. <a href="/ministerio" style="color:#006633;">Tentar novamente</a>`;
                    form.style.display = 'none';
                });
        }

        // Função para carregar a lista de laboratórios
        window.carregarLaboratorios = async function() {
            tabelaCorpo.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem;"><div class="loading-spinner"></div></td></tr>';
            try {
                const response = await fetch('/api/labs', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!response.ok) throw new Error('Erro ao carregar');
                const labs = await response.json();
                if (!labs.length) {
                    tabelaCorpo.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem;">Nenhum laboratório registado.</td></tr>';
                    totalLabs.textContent = '';
                    return;
                }
                totalLabs.textContent = `Total: ${labs.length} unidade(s)`;
                let html = '';
                labs.forEach(lab => {
                    const statusClass = lab.ativo ? 'status-badge' : 'status-badge inativo';
                    const statusText = lab.ativo ? 'Ativo' : 'Inativo';
                    html += `
                        <tr>
                            <td><strong>${lab.nome || '—'}</strong></td>
                            <td>${lab.nif || '—'}</td>
                            <td>${lab.provincia || '—'}</td>
                            <td><span class="${statusClass}">${statusText}</span></td>
                            <td class="acoes">
                                <button class="btn-acao" onclick="verDetalhes('${lab._id}')" title="Ver detalhes">👁️</button>
                                <button class="btn-acao" onclick="gerarPdfLab('${lab._id}')" title="Gerar PDF">📄</button>
                                <button class="btn-acao" onclick="editarLab('${lab._id}')" title="Editar">✏️</button>
                                <button class="btn-acao" onclick="toggleStatus('${lab._id}', ${lab.ativo})" title="${lab.ativo ? 'Desativar' : 'Ativar'}">${lab.ativo ? '❌' : '✅'}</button>
                            </td>
                        </tr>
                    `;
                });
                tabelaCorpo.innerHTML = html;
            } catch (error) {
                tabelaCorpo.innerHTML = `<tr><td colspan="5" style="text-align: center; color: red; padding: 2rem;">Erro: ${error.message}</td></tr>`;
            }
        };

        // Funções de ação (exemplo, podem ser implementadas)
        window.verDetalhes = function(id) {
            alert('Ver detalhes do laboratório ID: ' + id + ' (a implementar)');
        };
        window.gerarPdfLab = function(id) {
            alert('Gerar PDF do laboratório ID: ' + id + ' (a implementar)');
        };
        window.editarLab = function(id) {
            alert('Editar laboratório ID: ' + id + ' (a implementar)');
        };
        window.toggleStatus = async function(id, ativo) {
            if (!confirm(`Deseja ${ativo ? 'desativar' : 'ativar'} este laboratório?`)) return;
            try {
                const response = await fetch(`/api/labs/${id}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ ativo: !ativo })
                });
                if (!response.ok) throw new Error('Erro ao alterar status');
                carregarLaboratorios(); // recarrega lista
            } catch (error) {
                alert('Erro: ' + error.message);
            }
        };

        // Submissão do formulário de registo
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const nome = document.getElementById('nome').value.trim();
            const nif = document.getElementById('nif').value.trim();
            const provincia = document.getElementById('provincia').value;

            if (!nome || !nif || !provincia) {
                alert('Preencha os campos obrigatórios: Nome, NIF e Província.');
                return;
            }
            if (!/^\d{10}$/.test(nif)) {
                alert('NIF deve conter exatamente 10 dígitos numéricos.');
                return;
            }

            const dados = {
                nome,
                nif,
                tipo: document.getElementById('tipo').value,
                provincia,
                municipio: document.getElementById('municipio').value.trim(),
                endereco: document.getElementById('endereco').value.trim(),
                telefone: document.getElementById('telefone').value.trim(),
                telefone2: document.getElementById('telefone2').value.trim(),
                email: document.getElementById('email').value.trim(),
                website: document.getElementById('website').value.trim(),
                diretor: document.getElementById('diretor').value.trim(),
                responsavelTecnico: document.getElementById('responsavelTecnico').value.trim(),
                licenca: document.getElementById('licenca').value.trim(),
                validadeLicenca: document.getElementById('validadeLicenca').value,
                observacoes: document.getElementById('observacoes').value.trim(),
                ativo: true
            };

            // Remove campos vazios
            Object.keys(dados).forEach(key => {
                if (dados[key] === '') delete dados[key];
            });

            btnSalvar.disabled = true;
            btnSalvar.textContent = '⏳ Registrando...';
            resultadoArea.classList.add('hidden');

            try {
                const response = await fetch('/api/labs', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(dados)
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.erro || result.message || 'Erro ao registrar');
                }

                // Mostra API Key e oculta formulário opcionalmente
                resultadoArea.innerHTML = `
                    <div style="background: #e8f5e9; border-left: 6px solid #006633; border-radius: 16px; padding: 2rem; margin-top: 2rem;">
                        <h3 style="color: #006633;">✅ Laboratório registado com sucesso!</h3>
                        <p style="margin: 1rem 0;"><strong>API Key:</strong></p>
                        <div style="background: white; padding: 1rem; border-radius: 12px; font-family: monospace; font-size: 1.2rem; word-break: break-all; border: 1px dashed #006633;">${result.apiKey || 'Chave não fornecida'}</div>
                        <p style="color: #666; margin-top: 1rem;">Guarde esta chave em local seguro. Ela será necessária para o laboratório aceder ao sistema.</p>
                        <button class="btn-secondary" onclick="fecharResultado()">Fechar</button>
                    </div>
                `;
                resultadoArea.classList.remove('hidden');
                form.reset();
                carregarLaboratorios(); // atualiza lista
            } catch (error) {
                alert('❌ ' + error.message);
            } finally {
                btnSalvar.disabled = false;
                btnSalvar.textContent = '📌 Registrar';
            }
        });

        window.fecharResultado = function() {
            resultadoArea.classList.add('hidden');
        };

        window.limparFormulario = function() {
            form.reset();
        };
    })();
</script>
</body>
</html>
