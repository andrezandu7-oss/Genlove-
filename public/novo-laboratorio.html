<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Laboratório · SNS Angola</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f0f4f0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 950px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 40, 20, 0.15);
            overflow: hidden;
            border: 1px solid rgba(0, 102, 51, 0.2);
        }
        .header {
            background: #006633;
            color: white;
            padding: 2rem 2.5rem;
        }
        .header h1 {
            font-weight: 600;
            font-size: 2rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 span {
            background: #ffcc00;
            color: #006633;
            font-size: 1rem;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 500;
        }
        .header p {
            opacity: 0.85;
            margin-top: 6px;
            font-size: 1rem;
        }
        .form-card {
            padding: 2.5rem;
        }
        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #006633;
            border-bottom: 2px solid #cce8d5;
            padding-bottom: 0.5rem;
            margin: 2rem 0 1.5rem 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title:first-of-type {
            margin-top: 0;
        }
        .section-title i {
            font-size: 1.6rem;
            opacity: 0.8;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }
        .campo {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 0.8rem;
        }
        .campo.full-width {
            grid-column: span 2;
        }
        label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #2d4a3b;
        }
        input, select, textarea {
            padding: 12px 14px;
            border: 1.5px solid #d0ded5;
            border-radius: 14px;
            font-size: 0.95rem;
            background: white;
            transition: 0.2s;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #006633;
            box-shadow: 0 0 0 3px rgba(0, 102, 51, 0.2);
        }
        .btn-primary {
            background: #006633;
            color: white;
            border: none;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 1.2rem;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 2rem;
            box-shadow: 0 8px 16px rgba(0, 102, 51, 0.3);
            letter-spacing: 0.5px;
        }
        .btn-primary:hover {
            background: #008040;
            transform: scale(1.02);
        }
        .btn-primary:disabled {
            background: #99bbaa;
            box-shadow: none;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        .revisao-card {
            background: #f9fdfa;
            border-radius: 24px;
            padding: 1.8rem 1.5rem;
            border: 1px solid #cce8d5;
            margin: 1.5rem 0;
        }
        .revisao-card p {
            margin: 10px 0;
            font-size: 1rem;
            border-bottom: 1px dashed #d0ded5;
            padding-bottom: 8px;
        }
        .revisao-card strong {
            display: inline-block;
            width: 160px;
            color: #006633;
        }
        .info-message {
            color: #2c5e3f;
            background: #e0f0e5;
            padding: 1rem;
            border-radius: 16px;
            font-size: 0.9rem;
            border-left: 4px solid #ffaa00;
            margin-bottom: 1.5rem;
        }
        .hidden {
            display: none;
        }
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        .button-group .btn-primary {
            margin-top: 0;
            flex: 2;
        }
        .button-group .btn-secondary {
            flex: 1;
        }
        .badge-obrigatorio {
            color: #cc3300;
            font-size: 0.7rem;
            margin-left: 5px;
        }
        .spinner {
            border: 5px solid #e6f0ea;
            border-top: 5px solid #006633;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>
            🏥 Novo Laboratório
            <span>MINISTÉRIO</span>
        </h1>
        <p>Registo de nova unidade no Sistema Nacional de Saúde</p>
    </div>

    <div class="form-card">
        <!-- Mensagem de autenticação -->
        <div id="authMessage" class="info-message">🔐 A validar credenciais...</div>

        <!-- Formulário de entrada (exibido inicialmente) -->
        <form id="labForm" style="display: none;">
            <div class="section-title">
                <span>🏛️</span> Dados da unidade
            </div>
            <div class="grid-2">
                <div class="campo full-width">
                    <label>Nome do Laboratório / Hospital / Clínica <span class="badge-obrigatorio">obrigatório</span></label>
                    <input type="text" id="nome" required placeholder="Ex: LabCentral Luanda">
                </div>
                <div class="campo">
                    <label>NIF <span class="badge-obrigatorio">obrigatório</span></label>
                    <input type="text" id="nif" maxlength="10" placeholder="10 dígitos" required>
                </div>
                <div class="campo">
                    <label>Tipo <span class="badge-obrigatorio">obrigatório</span></label>
                    <select id="tipo" required>
                        <option value="laboratorio">Laboratório</option>
                        <option value="hospital">Hospital</option>
                        <option value="clinica">Clínica</option>
                    </select>
                </div>
                <div class="campo">
                    <label>Província <span class="badge-obrigatorio">obrigatório</span></label>
                    <select id="provincia" required>
                        <option value="">Selecione</option>
                        <option value="Bengo">Bengo</option>
                        <option value="Benguela">Benguela</option>
                        <option value="Bié">Bié</option>
                        <option value="Cabinda">Cabinda</option>
                        <option value="Cuando Cubango">Cuando Cubango</option>
                        <option value="Cuanza Norte">Cuanza Norte</option>
                        <option value="Cuanza Sul">Cuanza Sul</option>
                        <option value="Cunene">Cunene</option>
                        <option value="Huambo">Huambo</option>
                        <option value="Huíla">Huíla</option>
                        <option value="Luanda">Luanda</option>
                        <option value="Lunda Norte">Lunda Norte</option>
                        <option value="Lunda Sul">Lunda Sul</option>
                        <option value="Malanje">Malanje</option>
                        <option value="Moxico">Moxico</option>
                        <option value="Namibe">Namibe</option>
                        <option value="Uíge">Uíge</option>
                        <option value="Zaire">Zaire</option>
                    </select>
                </div>
                <div class="campo">
                    <label>Município</label>
                    <input type="text" id="municipio" placeholder="Ex: Ingombota">
                </div>
                <div class="campo full-width">
                    <label>Endereço completo</label>
                    <input type="text" id="endereco" placeholder="Rua, número, bairro">
                </div>
                <div class="campo">
                    <label>Telefone</label>
                    <input type="tel" id="telefone" placeholder="923000000">
                </div>
                <div class="campo">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="contato@lab.ao">
                </div>
                <div class="campo">
                    <label>Diretor</label>
                    <input type="text" id="diretor" placeholder="Nome do diretor">
                </div>
                <div class="campo">
                    <label>Responsável Técnico</label>
                    <input type="text" id="responsavelTecnico" placeholder="Se diferente do diretor">
                </div>
            </div>

            <!-- Botão para avançar para revisão -->
            <button type="button" class="btn-primary" id="btnRevisar">🔍 Revisar dados</button>
        </form>

        <!-- Área de revisão (oculta inicialmente) -->
        <div id="revisaoArea" class="hidden">
            <div class="section-title">
                <span>✅</span> Confirme os dados
            </div>
            <div class="revisao-card" id="dadosRevisao">
                <!-- preenchido via js -->
            </div>
            <div class="button-group">
                <button class="btn-primary" id="btnConfirmar">📌 Confirmar registo</button>
                <button class="btn-secondary" id="btnVoltar">✏️ Voltar</button>
            </div>
        </div>

        <!-- Área de resultado / sucesso -->
        <div id="resultadoArea" class="hidden"></div>
    </div>
</div>

<script>
    (function() {
        const token = localStorage.getItem('token');
        const authMsg = document.getElementById('authMessage');
        const labForm = document.getElementById('labForm');
        const revisaoArea = document.getElementById('revisaoArea');
        const dadosRevisao = document.getElementById('dadosRevisao');
        const resultadoArea = document.getElementById('resultadoArea');
        const btnRevisar = document.getElementById('btnRevisar');
        const btnConfirmar = document.getElementById('btnConfirmar');
        const btnVoltar = document.getElementById('btnVoltar');

        // Verificar autenticação
        if (!token) {
            authMsg.innerHTML = '❌ Sessão expirada. <a href="/ministerio" style="color:#006633;font-weight:bold;">Fazer login</a>';
            labForm.style.display = 'none';
        } else {
            // Opcional: validar token com uma chamada simples (ex: /api/stats)
            fetch('/api/stats', { headers: { 'Authorization': 'Bearer ' + token } })
                .then(res => {
                    if (!res.ok) throw new Error('Token inválido');
                    return res.json();
                })
                .then(() => {
                    authMsg.innerHTML = '✅ Autenticado como <strong>Ministério da Saúde</strong>';
                    labForm.style.display = 'block';
                })
                .catch(err => {
                    authMsg.innerHTML = `❌ Erro de autenticação: ${err.message}. <a href="/ministerio" style="color:#006633;">Re-login</a>`;
                    labForm.style.display = 'none';
                });
        }

        // Botão "Revisar dados": valida campos obrigatórios e mostra pré-visualização
        btnRevisar.addEventListener('click', function() {
            const nome = document.getElementById('nome').value.trim();
            const nif = document.getElementById('nif').value.trim();
            const provincia = document.getElementById('provincia').value;

            if (!nome || !nif || !provincia) {
                alert('Preencha os campos obrigatórios: Nome, NIF e Província.');
                return;
            }

            // Recolher todos os valores
            const dados = {
                nome,
                nif,
                tipo: document.getElementById('tipo').value,
                provincia,
                municipio: document.getElementById('municipio').value.trim() || 'Não informado',
                endereco: document.getElementById('endereco').value.trim() || 'Não informado',
                telefone: document.getElementById('telefone').value.trim() || 'Não informado',
                email: document.getElementById('email').value.trim() || 'Não informado',
                diretor: document.getElementById('diretor').value.trim() || 'Não informado',
                responsavelTecnico: document.getElementById('responsavelTecnico').value.trim() || 'Não informado'
            };

            // Preencher card de revisão
            dadosRevisao.innerHTML = `
                <p><strong>Nome:</strong> ${dados.nome}</p>
                <p><strong>NIF:</strong> ${dados.nif}</p>
                <p><strong>Tipo:</strong> ${dados.tipo}</p>
                <p><strong>Província:</strong> ${dados.provincia}</p>
                <p><strong>Município:</strong> ${dados.municipio}</p>
                <p><strong>Endereço:</strong> ${dados.endereco}</p>
                <p><strong>Telefone:</strong> ${dados.telefone}</p>
                <p><strong>Email:</strong> ${dados.email}</p>
                <p><strong>Diretor:</strong> ${dados.diretor}</p>
                <p><strong>Resp. Técnico:</strong> ${dados.responsavelTecnico}</p>
            `;

            // Guardar dados temporariamente para uso na confirmação
            window.dadosTemp = dados;

            // Alternar visibilidade
            labForm.style.display = 'none';
            revisaoArea.classList.remove('hidden');
        });

        // Botão "Voltar" da revisão
        btnVoltar.addEventListener('click', function() {
            revisaoArea.classList.add('hidden');
            labForm.style.display = 'block';
        });

        // Botão "Confirmar registo"
        btnConfirmar.addEventListener('click', async function() {
            if (!window.dadosTemp) return;

            const dados = window.dadosTemp;
            btnConfirmar.disabled = true;
            btnConfirmar.textContent = '⏳ A registar...';

            try {
                const response = await fetch('/api/labs', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({
                        nome: dados.nome,
                        nif: dados.nif,
                        tipo: dados.tipo,
                        provincia: dados.provincia,
                        municipio: dados.municipio === 'Não informado' ? '' : dados.municipio,
                        endereco: dados.endereco === 'Não informado' ? '' : dados.endereco,
                        telefone: dados.telefone === 'Não informado' ? '' : dados.telefone,
                        email: dados.email === 'Não informado' ? '' : dados.email,
                        diretor: dados.diretor === 'Não informado' ? '' : dados.diretor,
                        responsavelTecnico: dados.responsavelTecnico === 'Não informado' ? '' : dados.responsavelTecnico,
                        ativo: true
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Erro ao registar laboratório');
                }

                // Sucesso: gerar PDF com os dados + apiKey
                const pdfData = {
                    nome: dados.nome,
                    nif: dados.nif,
                    tipo: dados.tipo,
                    provincia: dados.provincia,
                    municipio: dados.municipio === 'Não informado' ? '' : dados.municipio,
                    endereco: dados.endereco === 'Não informado' ? '' : dados.endereco,
                    telefone: dados.telefone === 'Não informado' ? '' : dados.telefone,
                    email: dados.email === 'Não informado' ? '' : dados.email,
                    diretor: dados.diretor === 'Não informado' ? '' : dados.diretor,
                    responsavelTecnico: dados.responsavelTecnico === 'Não informado' ? '' : dados.responsavelTecnico,
                    apiKey: result.apiKey,
                    ativo: true
                };

                // Chamar geração PDF (abre automaticamente)
                await gerarPDF(pdfData);

                // Mostrar mensagem de sucesso com a chave
                resultadoArea.innerHTML = `
                    <div class="revisao-card" style="text-align:center;">
                        <div style="font-size:2rem; color:#006633;">✅</div>
                        <h3 style="color:#006633; margin:10px 0;">Laboratório registado com sucesso!</h3>
                        <p><strong>API Key gerada:</strong></p>
                        <p style="background:#f0f0f0; padding:10px; border-radius:8px; font-family:monospace; word-break:break-all;">${result.apiKey}</p>
                        <p style="margin-top:20px;">O PDF foi aberto automaticamente.</p>
                        <button class="btn-primary" style="margin-top:20px;" onclick="window.location.href='/admin-dashboard'">📋 Ir para dashboard</button>
                    </div>
                `;
                resultadoArea.classList.remove('hidden');
                revisaoArea.classList.add('hidden');
                labForm.style.display = 'none'; // esconder formulário

            } catch (error) {
                alert('Erro: ' + error.message);
                btnConfirmar.disabled = false;
                btnConfirmar.textContent = '📌 Confirmar registo';
            }
        });

        // Função para gerar PDF (mesma lógica do dashboard)
        async function gerarPDF(dados) {
            try {
                const response = await fetch('/api/labs/pdf', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(dados)
                });
                if (!response.ok) throw new Error('Erro ao gerar PDF');
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                window.open(url, '_blank');
                setTimeout(() => window.URL.revokeObjectURL(url), 1000);
            } catch (e) {
                console.error('Erro PDF', e);
                alert('Erro ao gerar PDF do laboratório, mas o registo foi concluído.');
            }
        }

        // Opcional: voltar ao dashboard se clicar em "Cancelar" não existe, mas pode-se adicionar um botão
        // (já temos o botão no resultado)
    })();
</script>
</body>
</html>
