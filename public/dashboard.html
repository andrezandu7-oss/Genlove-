<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - SNS</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        display: flex;
        min-height: 100vh;
        background: #f4f4f4;
    }
    .sidebar {
        width: 250px;
        background: #006633;
        color: white;
        height: 100vh;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    .sidebar h2 {
        margin-bottom: 20px;
    }
    .sidebar p {
        margin: 0;
        cursor: pointer;
        padding: 8px 10px;
        border-radius: 8px;
        transition: 0.2s;
    }
    .sidebar p:hover {
        background: rgba(255,255,255,0.2);
    }
    .main {
        flex: 1;
        padding: 30px;
    }
    .main h1 {
        margin-bottom: 20px;
        color: #006633;
    }
    button {
        background: #dc3545;
        color: white;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        border-radius: 6px;
        font-size: 14px;
    }
    .stats {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
    }
    .stat-card {
        background: white;
        flex: 1;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        text-align: center;
    }
    .stat-card h3 {
        margin: 0 0 10px 0;
        color: #333;
        font-size: 16px;
    }
    .stat-card span {
        font-size: 28px;
        font-weight: bold;
        color: #006633;
    }
</style>
</head>
<body>

<div class="sidebar">
    <h2>SNS</h2>
    <p onclick="location.href='/admin-dashboard'">Dashboard</p>
    <p onclick="location.href='/laboratorios'">Laboratórios</p>
    <p onclick="location.href='/certificados'">Certificados</p>
</div>

<div class="main">
    <h1>Dashboard</h1>
    <div class="stats">
        <div class="stat-card">
            <h3>Laboratórios</h3>
            <span id="countLabs">0</span>
        </div>
        <div class="stat-card">
            <h3>Hôpitaux</h3>
            <span id="countHospitals">0</span>
        </div>
        <div class="stat-card">
            <h3>Empresas</h3>
            <span id="countCompanies">0</span>
        </div>
    </div>
    <button onclick="logout()">Sair</button>
</div>

<script>
    // Redirection si pas de token
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
    }

    function logout() {
        localStorage.removeItem('token');
        window.location.href = '/';
    }

    // Fonction pour charger les stats
    async function carregarStats() {
        try {
            const res = await fetch('/api/stats', {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });
            if (!res.ok) throw new Error('Erro ao carregar estatísticas');
            const stats = await res.json();
            document.getElementById('countLabs').textContent = stats.labs || 0;
            document.getElementById('countHospitals').textContent = stats.hospitals || 0;
            document.getElementById('countCompanies').textContent = stats.companies || 0;
        } catch (err) {
            console.error(err);
            alert('Não foi possível carregar as estatísticas');
        }
    }

    // Charger stats au démarrage
    carregarStats();
</script>

</body>
</html>
