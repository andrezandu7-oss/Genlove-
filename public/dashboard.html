<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SNS</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            display: flex;
        }
        .sidebar {
            width: 250px;
            background: #006633;
            color: white;
            height: 100vh;
            padding: 20px;
        }
        .main {
            flex: 1;
            padding: 30px;
        }
        button {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>SNS</h2>
        <p>Dashboard</p>
        <p>Laboratórios</p>
        <p>Certificados</p>
    </div>
    <div class="main">
        <h1>Dashboard</h1>
        <button onclick="logout()">Sair</button>
    </div>

    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = '/';
        }
        
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }
    </script>
</body>
</html>
