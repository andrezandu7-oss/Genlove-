<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Certificado - SNS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f4f7f6; display: flex; }
        .sidebar { width: 260px; background: #006633; color: white; height: 100vh; padding: 25px; position: fixed; }
        .sidebar h2 { font-size: 22px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        .sidebar a { display: block; color: rgba(255,255,255,0.8); text-decoration: none; padding: 12px; margin: 8px 0; border-radius: 6px; transition: 0.3s; }
        .sidebar a:hover { background: #004d26; color: white; }
        .main { margin-left: 260px; padding: 40px; width: 100%; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 900px; margin: auto; }
        h1 { color: #333; margin-bottom: 25px; font-size: 24px; border-left: 5px solid #006633; padding-left: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; }
        input:focus { border-color: #006633; outline: none; box-shadow: 0 0 5px rgba(0,102,51,0.2); }
        .full { grid-column: span 2; }
        .btn-group { margin-top: 30px; display: flex; gap: 15px; }
        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; flex: 1; }
        .btn-save { background: #006633; color: white; }
        .btn-save:hover { background: #004d26; }
        .btn-cancel { background: #eee; color: #333; }
        .btn-cancel:hover { background: #ddd; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>SNS - Lab</h2>
        <a href="/lab-dashboard">Voltar ao Painel</a>
        <a href="/lab-dashboard">Meus Certificados</a>
    </div>

    <div class="main">
        <div class="container">
            <h1>Emissão de Novo Certificado</h1>
            
            <div class="grid">
                <div class="form-group full">
                    <label>Tipo de Certificado</label>
                    <select id="tipo">
                        <option value="1">GENÓTIPO (Exame de Sangue)</option>
                        <option value="2">ATESTADO DE BOA SAÚDE</option>
                        <option value="3">ATESTADO DE INCAPACIDADE</option>
                        <option value="4">CERTIFICADO DE APTIDÃO</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Nome Completo do Paciente</label>
                    <input type="text" id="nome" placeholder="Ex: João Silva">
                </div>
                <div class="form-group">
                    <label>Nº Bilhete de Identidade (BI)</label>
                    <input type="text" id="bi" placeholder="000000000AA000">
                </div>
                <div class="form-group">
                    <label>Data de Nascimento</label>
                    <input type="date" id="nascimento">
                </div>
                <div class="form-group">
                    <label>Gênero</label>
                    <select id="genero">
                        <option value="M">Masculino</option>
                        <option value="F">Feminino</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" id="telefone">
                </div>
                <div class="form-group">
                    <label>Endereço</label>
                    <input type="text" id="endereco">
                </div>

                <div class="form-group">
                    <label>Peso (kg)</label>
                    <input type="number" id="peso" step="0.1">
                </div>
                <div class="form-group">
                    <label>Altura (cm)</label>
                    <input type="number" id="altura">
                </div>
                <div class="form-group">
                    <label>Tensão Arterial</label>
                    <input type="text" id="tensao" placeholder="Ex: 12/8">
                </div>
                <div class="form-group">
                    <label>Grupo Sanguíneo</label>
                    <select id="grupo">
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nível de Hemoglobina (Hb)</label>
                    <input type="text" id="hb" placeholder="Ex: AA, SS, SC">
                </div>
                <div class="form-group full">
                    <label>Observações Médicas</label>
                    <textarea id="obs" rows="3"></textarea>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-cancel" onclick="window.location.href='/lab-dashboard'">Cancelar</button>
                <button class="btn btn-save" onclick="confirmarDados()">Validar e Gerar PDF Oficial</button>
            </div>
        </div>
    </div>

    <script>
        const key = localStorage.getItem("labKey");
        if(!key) window.location.href="/lab-login";

        async function confirmarDados() {
            const dados = {
                tipo: document.getElementById("tipo").value,
                paciente: {
                    nomeCompleto: document.getElementById("nome").value,
                    bi: document.getElementById("bi").value,
                    nascimento: document.getElementById("nascimento").value,
                    genero: document.getElementById("genero").value,
                    telefone: document.getElementById("telefone").value,
                    endereco: document.getElementById("endereco").value
                },
                clinicos: {
                    peso: document.getElementById("peso").value,
                    altura: document.getElementById("altura").value,
                    tensao: document.getElementById("tensao").value,
                    grupoSanguineo: document.getElementById("grupo").value,
                    hemoglobina: document.getElementById("hb").value
                },
                observacoes: document.getElementById("obs").value
            };

            // Validation simple
            if(!dados.paciente.nomeCompleto || !dados.paciente.bi) {
                return alert("Por favor, preencha o nome e o BI do paciente.");
            }

            try {
                const response = await fetch('/api/certificados/criar', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-api-key': key 
                    },
                    body: JSON.stringify(dados)
                });

                const result = await response.json();

                if (result.success) {
                    // Ouvre le PDF propre généré par le serveur
                    window.open(`/api/certificados/pdf/${result.id}`, '_blank');
                    // Retour au dashboard
                    window.location.href = '/lab-dashboard';
                } else {
                    alert("Erro: " + (result.message || "Não foi possível criar o certificado."));
                }
            } catch (err) {
                console.error(err);
                alert("Erro de conexão com o servidor Render.");
            }
        }
    </script>
</body>
</html>
