<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Certificado - SNS Angola</title>
    <style>
        :root { --primary: #006633; --secondary: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--secondary); padding: 20px; }
        .container { max-width: 800px; background: white; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .hidden { display: none; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .section-title { background: #e8f5e9; padding: 10px; margin: 20px 0 15px 0; border-left: 5px solid var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Emissão de Certificado Nacional</h2>
    
    <form id="formCertificado">
        <div class="form-group">
            <label>Tipo de Certificado</label>
            <select id="tipoCertificado" onchange="alternarCampos()" required>
                <option value="">Selecione o modelo...</option>
                <option value="1">Certificado de Genótipo</option>
                <option value="2">Certificado de Boa Saúde</option>
                <option value="3">Atestado de Incapacidade</option>
                <option value="4">Atestado de Aptidão Física</option>
                <option value="5">Saúde Materna</option>
                <option value="6">Consulta Pré-Natal (CPN)</option>
                <option value="7">Boletim Epidemiológico</option>
            </select>
        </div>

        <div class="section-title">Dados do Paciente</div>
        <div class="form-group">
            <label>Nome Completo</label>
            <input type="text" id="nomeCompleto" required>
        </div>
        <div class="grid">
            <div class="form-group">
                <label>Nº Bilhete de Identidade (BI)</label>
                <input type="text" id="bi" required>
            </div>
            <div class="form-group">
                <label>Gênero</label>
                <select id="genero" required>
                    <option value="M">Masculino</option>
                    <option value="F">Feminino</option>
                </select>
            </div>
        </div>

        <div id="camposDinamicos">
            <div id="secaoGenotipo" class="hidden">
                <div class="section-title">Dados Clínicos - Genótipo</div>
                <div class="grid">
                    <div class="form-group">
                        <label>Genótipo (Hb)</label>
                        <select id="genotipo">
                            <option value="AA">AA (Normal)</option>
                            <option value="AS">AS (Traço Falciforme)</option>
                            <option value="SS">SS (Anemia Falciforme)</option>
                            <option value="SC">SC</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Grupo Sanguíneo</label>
                        <select id="grupoSanguineo">
                            <option value="A+">A+</option><option value="A-">A-</option>
                            <option value="B+">B+</option><option value="B-">B-</option>
                            <option value="O+">O+</option><option value="O-">O-</option>
                            <option value="AB+">AB+</option><option value="AB-">AB-</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="secaoCPN" class="hidden">
                <div class="section-title">Dados Pré-Natal</div>
                <div class="grid">
                    <div class="form-group"><label>Nº de Gestações</label><input type="number" id="gestacoes"></div>
                    <div class="form-group"><label>Nº de Partos</label><input type="number" id="partos"></div>
                </div>
                <div class="grid">
                    <div class="form-group"><label>VIH</label><select id="vih"><option value="Negativo">Negativo</option><option value="Positivo">Positivo</option></select></div>
                    <div class="form-group"><label>Malária</label><select id="malaria"><option value="Negativo">Negativo</option><option value="Positivo">Positivo</option></select></div>
                </div>
            </div>

            <div id="secaoGeral" class="hidden">
                <div class="section-title">Conclusão Médica</div>
                <div class="form-group">
                    <label>Avaliação / Resultado</label>
                    <textarea id="resultado" rows="3" placeholder="Ex: Apto para o trabalho, Clinicamente saudável..."></textarea>
                </div>
            </div>
        </div>

        <button type="button" class="btn-submit" onclick="prepararRevisao()">REVISAR E EMITIR</button>
    </form>
</div>

<script>
    function alternarCampos() {
        const tipo = document.getElementById("tipoCertificado").value;
        const secoes = ["secaoGenotipo", "secaoCPN", "secaoGeral"];
        secoes.forEach(s => document.getElementById(s).classList.add("hidden"));

        if (tipo == "1") document.getElementById("secaoGenotipo").classList.remove("hidden");
        if (tipo == "6") document.getElementById("secaoCPN").classList.remove("hidden");
        if (tipo != "") document.getElementById("secaoGeral").classList.remove("hidden");
    }

    function prepararRevisao() {
        const payload = {
            tipo: document.getElementById("tipoCertificado").value,
            paciente: {
                nomeCompleto: document.getElementById("nomeCompleto").value,
                bi: document.getElementById("bi").value,
                genero: document.getElementById("genero").value
            },
            dados: {
                genotipo: document.getElementById("genotipo").value,
                grupoSanguineo: document.getElementById("grupoSanguineo").value,
                resultado: document.getElementById("resultado").value,
                gestacoes: document.getElementById("gestacoes").value,
                examesCPN: {
                    vih: document.getElementById("vih").value,
                    malaria: document.getElementById("malaria").value
                }
            }
        };

        // Envia para a função de revisão que está no Dashboard (Pai)
        if (window.opener) {
            window.opener.abrirRevisaoEmissao(payload);
            window.close();
        } else {
            // Caso não esteja em popup, tenta chamar via parent ou envia direto
            alert("Dados prontos para revisão. Verifique o painel principal.");
            console.log(payload);
        }
    }
</script>
</body>
</html>
