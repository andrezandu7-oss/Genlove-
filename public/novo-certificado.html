<script>
    function toggleExame(exameId) {
        const checkbox = document.getElementById(exameId + '_nao');
        const campo = document.getElementById(exameId);
        if(campo) {
            if(checkbox && checkbox.checked) {
                campo.disabled = true;
                campo.value = "";
            } else {
                campo.disabled = false;
            }
        }
    }
</script>
