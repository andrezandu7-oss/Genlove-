<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS - Emitir Certificado</title>
    <style>
        :root {--primary: #006633; --bg: #f4f7f6; --text: #333;}
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 800px; width: 100%; margin: 20px auto; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 30px; }
        h1 { color: var(--primary); margin-bottom: 25px; font-size: 24px; border-left: 6px solid var(--primary); padding-left: 15px; }
        .campo { margin-bottom: 20px; }
        .campo label { display: block; font-weight: bold; margin-bottom: 6px; color: #555; font-size: 13px; text-transform: uppercase; }
        .campo input, .campo select, .campo textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .campo textarea { min-height: 80px; resize: vertical; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,102,51,0.3); }
        .btn-secondary { background: #f0f0f0; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; }
        .info-lab { background: #e8f5e9; padding: 15px; border-radius: 8px; margin-bottom: 30px; border-left: 4px solid var(--primary); }
        .info-lab p { margin: 5px 0; font-size: 14px; }
        .hidden { display: none; }
        .loading { text-align: center; padding: 30px; color: #666; }
        .error { color: #c0392b; background: #fdeaea; padding: 10px; border-radius: 6px; margin-bottom: 20px; }
        .success { color: var(--primary); background: #e8f5e9; padding: 10px; border-radius: 6px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📄 Emitir Novo Certificado</h1>
            <div id="infoLab" class="info-lab">Carregando informações do laboratório...</div>
            <div id="errorMsg" class="error hidden"></div>
            <div id="successMsg" class="success hidden"></div>

            <form id="certForm">
                <!-- Tipo de certificado -->
                <div class="campo">
                    <label>Tipo de Certificado *</label>
                    <select id="tipo" required>
                        <option value="">Selecione</option>
                        <option value="1">GENÓTIPO</option>
                        <option value="2">BOA SAÚDE</option>
                        <option value="3">INCAPACIDADE</option>
                        <option value="4">APTIDÃO</option>
                        <option value="5">SAÚDE MATERNA</option>
                        <option value="6">PRÉ-NATAL</option>
                        <option value="7">EPIDEMIOLÓGICO</option>
                        <option value="8">CSD (Deslocação)</option>
                    </select>
                </div>

                <h3 style="color: var(--primary); margin: 20px 0 10px;">👤 Dados do Paciente</h3>
                <div class="grid-2">
                    <div class="campo"><label>Nome Completo *</label><input type="text" id="pacienteNome" required></div>
                    <div class="campo"><label>BI / Passaporte</label><input type="text" id="pacienteBi"></div>
                    <div class="campo"><label>Data Nascimento</label><input type="date" id="pacienteDataNasc"></div>
                    <div class="campo">
                        <label>Género</label>
                        <select id="pacienteGenero">
                            <option value="">Selecione</option>
                            <option value="M">Masculino</option>
                            <option value="F">Feminino</option>
                        </select>
                    </div>
                </div>

                <h3 style="color: var(--primary); margin: 20px 0 10px;">🔬 Responsável pela Emissão</h3>
                <div class="grid-2">
                    <div class="campo"><label>Nome do Laborantin</label><input type="text" id="laborantinNome"></div>
                    <div class="campo"><label>Registro Profissional</label><input type="text" id="laborantinRegistro"></div>
                </div>

                <h3 style="color: var(--primary); margin: 20px 0 10px;">📋 Dados Médicos</h3>
                <div class="grid-2">
                    <div class="campo"><label>Genótipo</label><input type="text" id="dadosGenotipo" placeholder="ex: AA, AS, SS"></div>
                    <div class="campo"><label>Grupo Sanguíneo</label><input type="text" id="dadosGrupoSanguineo" placeholder="A+, O-..."></div>
                    <div class="campo"><label>Avaliação / Observações</label><textarea id="dadosAvaliacao"></textarea></div>
                    <div class="campo"><label>Período (início)</label><input type="date" id="dadosPeriodoInicio"></div>
                    <div class="campo"><label>Período (fim)</label><input type="date" id="dadosPeriodoFim"></div>
                    <div class="campo"><label>Dias de Incapacidade</label><input type="number" id="dadosDiasIncapacidade" min="0"></div>
                    <div class="campo"><label>Tipo de Aptidão</label><input type="text" id="dadosTipoAptidao" placeholder="ex: APTO, NÃO APTO"></div>
                    <div class="campo"><label>Restrições (separadas por vírgula)</label><input type="text" id="dadosRestricoes" placeholder="ex: não dirigir, evitar esforços"></div>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="submit" class="btn-primary">✅ Emitir Certificado</button>
                    <button type="button" class="btn-secondary" onclick="history.back()">↩️ Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const labKey = localStorage.getItem('labKey');
        if (!labKey) {
            window.location.href = '/lab-login';
        }

        const infoLabDiv = document.getElementById('infoLab');
        const errorDiv = document.getElementById('errorMsg');
        const successDiv = document.getElementById('successMsg');
        const form = document.getElementById('certForm');

        // Carregar dados do laboratório
        async function loadLabInfo() {
            try {
                const res = await fetch('/api/labs/me', { headers: { 'x-api-key': labKey } });
                if (!res.ok) throw new Error('Não foi possível carregar os dados do laboratório');
                const lab = await res.json();
                infoLabDiv.innerHTML = `
                    <p><strong>${lab.nome}</strong> (${lab.provincia})</p>
                    <p>NIF: ${lab.nif} | Telefone: ${lab.telefone || '---'}</p>
                    <p>Total de emissões: ${lab.totalEmissoes || 0}</p>
                `;
            } catch (e) {
                infoLabDiv.innerHTML = '<p class="error">Erro ao carregar laboratório. Verifique sua conexão.</p>';
            }
        }

        // Submissão do formulário
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const tipo = document.getElementById('tipo').value;
            if (!tipo) {
                showError('Selecione o tipo de certificado.');
                return;
            }

            // Montar objeto paciente
            const paciente = {
                nomeCompleto: document.getElementById('pacienteNome').value,
                bi: document.getElementById('pacienteBi').value || undefined,
                dataNascimento: document.getElementById('pacienteDataNasc').value || undefined,
                genero: document.getElementById('pacienteGenero').value || undefined
            };

            // Montar objeto laborantin
            const laborantin = {
                nome: document.getElementById('laborantinNome').value || 'Não informado',
                registro: document.getElementById('laborantinRegistro').value || undefined
            };

            // Montar objeto dados (apenas campos preenchidos)
            const dados = {};
            const camposDados = {
                genotipo: document.getElementById('dadosGenotipo').value,
                grupoSanguineo: document.getElementById('dadosGrupoSanguineo').value,
                avaliacao: document.getElementById('dadosAvaliacao').value,
                periodoInicio: document.getElementById('dadosPeriodoInicio').value,
                periodoFim: document.getElementById('dadosPeriodoFim').value,
                diasIncapacidade: document.getElementById('dadosDiasIncapacidade').value ? parseInt(document.getElementById('dadosDiasIncapacidade').value) : undefined,
                tipoAptidao: document.getElementById('dadosTipoAptidao').value,
                restricoes: document.getElementById('dadosRestricoes').value ? document.getElementById('dadosRestricoes').value.split(',').map(s => s.trim()) : []
            };
            for (let [key, value] of Object.entries(camposDados)) {
                if (value !== undefined && value !== '' && (Array.isArray(value) ? value.length > 0 : true)) {
                    dados[key] = value;
                }
            }

            const payload = { paciente, laborantin, dados };

            try {
                const res = await fetch(`/api/certificados/emitir/${tipo}`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-api-key': labKey
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    showSuccess(`Certificado emitido com sucesso! Número: ${data.numero}`);
                    form.reset();
                } else {
                    showError(data.error || 'Erro ao emitir certificado.');
                }
            } catch (err) {
                showError('Erro de conexão com o servidor.');
            }
        });

        function showError(msg) {
            errorDiv.innerText = msg;
            errorDiv.classList.remove('hidden');
            successDiv.classList.add('hidden');
        }

        function showSuccess(msg) {
            successDiv.innerText = msg;
            successDiv.classList.remove('hidden');
            errorDiv.classList.add('hidden');
        }

        function hideMessages() {
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
        }

        loadLabInfo();
    </script>
</body>
</html>
