<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Certificado - Laboratório SNS</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { 
            background: linear-gradient(135deg, #006633 0%, #004d26 100%); 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 20px 40px rgba(0,102,51,0.3); 
            overflow: hidden;
        }
        .header {
            background: linear-gradient(90deg, #006633, #00a651);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 16px; }
        .form-container { padding: 40px; }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group.full { grid-column: span 2; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #333; 
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8f9fa;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #006633;
            background: white;
            box-shadow: 0 0 0 3px rgba(0,102,51,0.1);
        }
        textarea { resize: vertical; min-height: 100px; }
        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary { 
            background: #006633; 
            color: white; 
            margin-right: 15px;
        }
        .btn-primary:hover { background: #004d26; transform: translateY(-2px); }
        .btn-secondary { 
            background: #6c757d; 
            color: white; 
        }
        .btn-secondary:hover { background: #545b62; transform: translateY(-2px); }
        .btn-group { text-align: center; margin-top: 40px; }
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .section-title {
            grid-column: span 2;
            text-align: center;
            font-size: 22px;
            color: #006633;
            margin: 30px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 3px solid #006633;
        }
        .tipo-certificado {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 5px solid #006633;
        }
        .required { color: #dc3545; }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full, .section-title { grid-column: span 1; }
            .form-container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Novo Certificado</h1>
            <p id="labInfo">Carregando informações do laboratório...</p>
        </div>
        
        <div class="form-container">
            <div id="alert" style="display: none;"></div>
            
            <!-- TIPO DE CERTIFICADO -->
            <div class="tipo-certificado">
                <h3>📋 Tipo de Certificado</h3>
                <select id="tipo" onchange="atualizarCamposTipo()" style="width:300px; padding:15px; font-size:18px;">
                    <option value="">Selecione o tipo...</option>
                    <option value="1">🧬 GENÓTIPO</option>
                    <option value="2">✅ BOA SAÚDE</option>
                    <option value="3">⚠️ INCAPACIDADE</option>
                    <option value="4">✅ APTIDÃO</option>
                    <option value="5">👩‍🍼 SAÚDE MATERNA</option>
                    <option value="6">🤰 PRÉ-NATAL</option>
                    <option value="7">🦠 EPIDEMIOLÓGICO</option>
                    <option value="8">📊 CSD</option>
                </select>
            </div>

            <!-- PACIENTE -->
            <div class="section-title">👤 Dados do Paciente</div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="pacienteNome">Nome Completo <span class="required">*</span></label>
                    <input type="text" id="pacienteNome" required maxlength="100">
                </div>
                <div class="form-group">
                    <label for="pacienteBI">BI / Documento <span class="required">*</span></label>
                    <input type="text" id="pacienteBI" required maxlength="20">
                </div>
                <div class="form-group">
                    <label for="pacienteDataNasc">Data de Nascimento <span class="required">*</span></label>
                    <input type="date" id="pacienteDataNasc" required>
                </div>
                <div class="form-group">
                    <label for="pacienteGenero">Gênero</label>
                    <select id="pacienteGenero">
                        <option value="">Selecione...</option>
                        <option value="Masculino">👨 Masculino</option>
                        <option value="Feminino">👩 Feminino</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="pacienteTelefone">Telefone</label>
                    <input type="tel" id="pacienteTelefone" placeholder="923 456 789">
                </div>
            </div>

            <!-- LABORANTIN -->
            <div class="section-title">🔬 Dados do Laborantin</div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="laborantinNome">Nome do Laborantin <span class="required">*</span></label>
                    <input type="text" id="laborantinNome" required maxlength="100">
                </div>
                <div class="form-group">
                    <label for="laborantinRegistro">Registro Profissional</label>
                    <input type="text" id="laborantinRegistro" maxlength="50">
                </div>
            </div>

            <!-- DADOS CLÍNICOS (conditionnel) -->
            <div id="dadosClinicos" class="section-title" style="display:none;">📊 Dados Clínicos</div>
            <div id="camposClinicos" style="display:none;">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="peso">Peso (kg)</label>
                        <input type="number" id="peso" step="0.1" min="0">
                    </div>
                    <div class="form-group">
                        <label for="altura">Altura (m)</label>
                        <input type="number" id="altura" step="0.01" min="0">
                    </div>
                    <div class="form-group">
                        <label for="pressao">Pressão Arterial</label>
                        <input type="text" id="pressao" placeholder="120/80">
                    </div>
                    <div class="form-group">
                        <label for="glicemia">Glicemia (mg/dL)</label>
                        <input type="number" id="glicemia">
                    </div>
                </div>
            </div>

            <!-- OBSERVAÇÕES -->
            <div class="section-title">📝 Observações / Resultados</div>
            <div class="form-group full">
                <label for="observacoes">Observações detalhadas</label>
                <textarea id="observacoes" placeholder="Resultados dos exames, diagnósticos, recomendações..."></textarea>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="gerarCertificado()">🎫 GERAR CERTIFICADO</button>
                <a href="/lab-dashboard" class="btn btn-secondary">← VOLTAR AO DASHBOARD</a>
            </div>
        </div>
    </div>

    <script>
        const key = localStorage.getItem("labKey");
        if (!key) {
            window.location.href = "/lab-login";
        }

        let labInfo = null;

        // Carregar info do laboratório
        async function carregarLabInfo() {
            try {
                const response = await fetch("/api/labs/me", {
                    headers: { "x-api-key": key }
                });
                const data = await response.json();
                labInfo = data;
                document.getElementById("labInfo").innerHTML = 
                    `Laboratório: <strong>${data.nome}</strong> | NIF: ${data.nif} | Província: ${data.provincia}`;
            } catch (e) {
                document.getElementById("labInfo").innerHTML = "Erro ao carregar dados do laboratório";
            }
        }

        function atualizarCamposTipo() {
            const tipo = document.getElementById("tipo").value;
            const camposClinicos = document.getElementById("camposClinicos");
            const dadosClinicos = document.getElementById("dadosClinicos");
            
            // Mostrar campos clínicos para certos tipos
            if (["2","4","5","6"].includes(tipo)) {
                camposClinicos.style.display = "block";
                dadosClinicos.style.display = "block";
            } else {
                camposClinicos.style.display = "none";
                dadosClinicos.style.display = "none";
            }
        }

        function mostrarAlerta(mensagem, tipo = 'success') {
            const alert = document.getElementById('alert');
            alert.textContent = mensagem;
            alert.className = `alert alert-${tipo}`;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 5000);
        }

        async function gerarCertificado() {
            if (!document.getElementById("tipo").value) {
                mostrarAlerta("Selecione o tipo de certificado!", 'error');
                return;
            }

            const dados = {
                tipo: parseInt(document.getElementById("tipo").value),
                paciente: {
                    nomeCompleto: document.getElementById("pacienteNome").value,
                    bi: document.getElementById("pacienteBI").value,
                    dataNascimento: document.getElementById("pacienteDataNasc").value,
                    genero: document.getElementById("pacienteGenero").value,
                    telefone: document.getElementById("pacienteTelefone").value
                },
                laborantin: {
                    nome: document.getElementById("laborantinNome").value,
                    registro: document.getElementById("laborantinRegistro").value
                },
                dados: {
                    peso: document.getElementById("peso").value,
                    altura: document.getElementById("altura").value,
                    pressao: document.getElementById("pressao").value,
                    glicemia: document.getElementById("glicemia").value
                },
                observacoes: document.getElementById("observacoes").value
            };

            try {
                const response = await fetch('/api/certificados/novo', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': key
                    },
                    body: JSON.stringify(dados)
                });

                const resultado = await response.json();

                if (response.ok) {
                    mostrarAlerta(`✅ Certificado ${resultado.numero} gerado com sucesso!`, 'success');
                    setTimeout(() => {
                        window.open(`/certificado/${resultado.numero}`, '_blank');
                        document.querySelectorAll('input, select, textarea').forEach(el => el.value = '');
                    }, 1500);
                } else {
                    mostrarAlerta(`❌ Erro: ${resultado.error}`, 'error');
                }
            } catch (error) {
                mostrarAlerta('❌ Erro de conexão: ' + error.message, 'error');
            }
        }

        // Auto-calcular data max nascimento
        document.getElementById('pacienteDataNasc').max = new Date(new Date().getFullYear() - 1, new Date().getMonth(), new Date().getDate()).toISOString().split('T')[0];

        // Carregar ao iniciar
        window.onload = carregarLabInfo;
    </script>
</body>
</html>
